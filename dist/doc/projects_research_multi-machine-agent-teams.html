## 1. Überblick & Problemstellung

**Das Problem:** Du hast mehrere Maschinen (Mac Mini, Laptop, Cloud-Server, Raspberry Pi) und willst AI-Agenten darauf verteilt laufen lassen — jeder Agent mit einer Spezialisierung (Researcher, Coder, Designer, Reviewer). Die Agenten sollen:

- Sich gegenseitig finden (Discovery)
- Aufgaben delegieren und Ergebnisse austauschen
- Unabhängig voneinander skalieren
- Sicher kommunizieren (Auth, Verschlüsselung)

**Zwei Ebenen:**
1. **Framework-Ebene:** Wie definiere ich Agenten, Rollen, Tasks? → CrewAI, AutoGen, LangGraph
2. **Protokoll-Ebene:** Wie kommunizieren Agenten maschinenübergreifend? → A2A, MCP, gRPC, HTTP

---

## 2. Framework-Vergleich

| Feature | **CrewAI** | **AutoGen** (MS) | **LangGraph** | **MetaGPT** | **OpenAI Swarm** |

| **Multi-Agent** | ✅ Crews + Flows | ✅ AgentChat + Core | ✅ Graph-basiert | ✅ SOP-Teams | ✅ Handoffs |
| **Multi-Machine nativ** | ❌ Single-Process | ✅ gRPC Runtime | ❌ Cloud-only (LangSmith) | ❌ Single-Process | ❌ Single-Process |
| **Distributed Runtime** | Nein (workaround: A2A/HTTP) | **Ja** (GrpcWorkerAgentRuntime) | Via LangSmith Deployment | Nein | Nein |
| **Orchestrierung** | Sequential/Hierarchical/Consensus | Topic-based Pub/Sub | Graph (Nodes + Edges) | SOP-Pipeline | Function Routing |
| **MCP Support** | Ja (Tools) | Ja (McpWorkbench) | Ja (via LangChain) | Begrenzt | Nein |
| **A2A Support** | Via Integration | Via Integration | Via Integration | Nein | Nein |
| **Sprache** | Python | Python, .NET, C++ | Python, JS | Python | Python |
| **Lizenz** | MIT | MIT | MIT | MIT | MIT |
| **Production-Ready** | ✅ Enterprise fokussiert | ⚠️ Experimental (distributed) | ✅ (mit LangSmith) | ⚠️ Research-nah | ❌ Experimental |

### Fazit Vergleich

- **Multi-Machine nativ:** Nur **AutoGen** hat ein echtes Distributed Runtime mit gRPC
- **Einfachster Einstieg:** **CrewAI** — aber Single-Process, Multi-Machine nur via Workaround
- **Production-Grade:** **LangGraph** mit LangSmith Deployment — aber Cloud-abhängig
- **Protokoll-Lösung:** **A2A** (Google) als Framework-agnostischer Standard für Agent-zu-Agent

## 3. Kommunikationsprotokolle: MCP vs A2A

### MCP (Model Context Protocol) — Anthropic

**Was es ist:** Ein Standard, um AI-Anwendungen mit externen Systemen (Tools, Datenquellen) zu verbinden.

**Analogie:** USB-C für AI — ein Agent steckt sich an Datenquellen und Tools an.

**Architektur:**
\`\`\`
AI Application (Host)
    └── MCP Client
           └── MCP Server (Tool/Datenquelle)
\`\`\`

**Kernkonzepte:**
- **Resources:** Daten, die der Agent lesen kann (Dateien, DB-Einträge)
- **Tools:** Aktionen, die der Agent ausführen kann (API-Calls, Berechnungen)
- **Prompts:** Vorgefertigte Prompt-Templates

**Wichtig für Multi-Machine:**
- MCP verbindet Agenten mit **Tools**, nicht Agenten mit **Agenten**
- Ein Agent auf Maschine A kann via MCP auf Tools auf Maschine B zugreifen
- Aber: Kein nativer Agent-zu-Agent Dialog

### A2A (Agent-to-Agent Protocol) — Google

**Was es ist:** Ein offener Standard für Kommunikation zwischen **opaken** Agenten-Systemen.

**Analogie:** HTTP für Agenten — jeder Agent ist ein Server, der Anfragen entgegennimmt.

**Architektur:**
\`\`\`
Agent A (Client)  ←→  Agent B (Server)
    │                      │
    └── Agent Card ←───────┘  (Discovery)
\`\`\`

**Kernkonzepte:**
- **Agent Card:** JSON-Dokument mit Capabilities, Endpoint, Auth-Info
- **Tasks:** Stateful Arbeitseinheiten mit Lifecycle (submitted → working → completed)
- **Messages:** Kommunikation zwischen Client und Server (user/agent Rollen)
- **Parts:** Kleinste Inhaltseinheit (Text, Dateien, strukturierte Daten)
- **Artifacts:** Outputs eines Tasks (generierte Dokumente, Bilder, etc.)

**Transport:** JSON-RPC 2.0 über HTTP(S), gRPC, oder REST

**Interaktionsmodi:**
- Synchron (Request/Response)
- Streaming (SSE — Server-Sent Events)
- Asynchron (Push Notifications via Webhook)

**SDKs:** Python, Go, JS, Java, .NET

### MCP vs A2A — Zusammenfassung

| | **MCP** | **A2A** |
|---|---------|---------|
| **Zweck** | Agent ↔ Tool | Agent ↔ Agent |
| **Wer spricht** | Ein Agent nutzt ein Tool | Zwei Agenten kollaborieren |
| **Opazität** | Tool-Implementierung ist transparent | Agenten sind Black Boxes |
| **Task Management** | Nein | Ja (Lifecycle, Status) |
| **Discovery** | Manuell konfiguriert | Agent Cards (automatisch) |
| **Multi-Machine** | Ja (Remote MCP Server) | **Ja (designt dafür)** |

**Fazit:** MCP und A2A sind **komplementär**, nicht konkurrierend:
- **MCP** = wie ein Agent Tools benutzt (vertikal)
- **A2A** = wie Agenten miteinander reden (horizontal)

## 4. CrewAI Deep Dive

### Architektur

\`\`\`
Flow (Orchestrator)
  ├── Step 1: Python-Logic
  ├── Step 2: Crew A kickoff
  │     ├── Agent: Researcher (role, goal, backstory)
  │     ├── Agent: Writer
  │     └── Tasks: research_task → write_task
  └── Step 3: Ergebnis verarbeiten
\`\`\`

### Installation

\`\`\`bash
pip install crewai
crewai create crew my_crew
cd my_crew
\`\`\`

### Multi-Machine mit CrewAI?

**Nativ:** ❌ CrewAI ist Single-Process. Alle Agenten laufen im selben Python-Prozess.

**Workarounds:**

#### Option A: CrewAI + A2A Wrapper
Jeden CrewAI-Agenten als A2A-Server wrappen:

\`\`\`python
# machine_a/server.py — Researcher Agent
from crewai import Agent, Task, Crew
from a2a.server import A2AServer

researcher = Agent(
    role="Senior Researcher",
    goal="Find comprehensive info on {topic}",
    backstory="Experienced research specialist...",
    llm="anthropic/claude-sonnet-4"
)

def handle_task(a2a_task):
    crew = Crew(
        agents=[researcher],
        tasks=[Task(
            description=a2a_task.message,
            agent=researcher,
            expected_output="Detailed research report"
        )]
    )
    result = crew.kickoff()
    return result.raw

server = A2AServer(
    name="Research Agent",
    skills=["research", "analysis"],
    handler=handle_task,
    port=8080
)
server.start()
\`\`\`

\`\`\`python
# machine_b/client.py — Orchestrator
from a2a.client import A2AClient

research_agent = A2AClient("http://machine-a:8080")
card = research_agent.get_agent_card()

# Task senden
task = research_agent.send_message("Research AI agent frameworks 2026")
print(task.result)
\`\`\`

#### Option B: CrewAI + HTTP API
Einfacher: Jeden Crew als FastAPI-Service wrappen:

\`\`\`python
# machine_a/api.py
from fastapi import FastAPI
from crewai import Agent, Task, Crew

app = FastAPI()

@app.post("/research")
async def research(topic: str):
    crew = Crew(agents=[...], tasks=[...])
    return {"result": crew.kickoff().raw}
\`\`\`

### Bewertung CrewAI für Multi-Machine

| Pro | Contra |
|-----|--------|
| Einfachstes Agent-Design (YAML-Config) | Kein nativer Distributed Mode |
| Große Community, viele Beispiele | Workaround nötig (A2A/HTTP) |
| Flows für Orchestrierung | Extra Infrastruktur-Code |

## 5. AutoGen Deep Dive (Distributed Runtime)

### Der einzige mit nativem Multi-Machine Support

AutoGen hat ein **experimentelles** Distributed Runtime basierend auf **gRPC**:

\`\`\`
┌─────────────────────────────────────────┐
│          Host Service (gRPC)            │
│         localhost:50051                  │
│  ┌─────────┐  ┌─────────┐             │
│  │ Registry│  │ Router  │              │
│  └─────────┘  └─────────┘             │
└──────┬──────────────┬──────────────────┘
       │              │
  ┌────┴────┐    ┌────┴────┐
  │Worker 1 │    │Worker 2 │
  │(Mac Mini)│    │(Laptop) │
  │Agent:    │    │Agent:   │
  │Researcher│    │Coder   │
  └─────────┘    └─────────┘
\`\`\`

### Installation

\`\`\`bash
pip install "autogen-agentchat" "autogen-ext[openai,grpc]"
\`\`\`

### Code: Distributed Setup

**Host Service (Maschine 1 — Orchestrator):**

\`\`\`python
# host.py — Läuft auf dem Mac Mini
from autogen_ext.runtimes.grpc import GrpcWorkerAgentRuntimeHost

host = GrpcWorkerAgentRuntimeHost(address="0.0.0.0:50051")
host.start()

# Blockiert bis SIGTERM
import asyncio
asyncio.run(host.stop_when_signal())
\`\`\`

**Worker 1 (Maschine 2 — Researcher):**

\`\`\`python
# worker_researcher.py — Läuft auf Laptop
import asyncio
from dataclasses import dataclass
from autogen_core import (
    DefaultTopicId, MessageContext, RoutedAgent,
    default_subscription, message_handler
)
from autogen_ext.runtimes.grpc import GrpcWorkerAgentRuntime

@dataclass
class ResearchRequest:
    topic: str

@dataclass
class ResearchResult:
    content: str

@default_subscription
class ResearcherAgent(RoutedAgent):
    def __init__(self):
        super().__init__("Researcher")

    @message_handler
    async def handle(self, msg: ResearchRequest, ctx: MessageContext) -> None:
        # Hier: LLM-Call für Research
        result = f"Research results for: {msg.topic}"
        await self.publish_message(
            ResearchResult(content=result),
            DefaultTopicId()
        )

async def main():
    runtime = GrpcWorkerAgentRuntime(host_address="mac-mini.local:50051")
    await runtime.start()
    await ResearcherAgent.register(runtime, "researcher", lambda: ResearcherAgent())
    await runtime.stop_when_signal()

asyncio.run(main())
\`\`\`

**Worker 2 (Maschine 3 — Coder):**

\`\`\`python
# worker_coder.py — Läuft auf Cloud-Server
import asyncio
from autogen_core import (
    DefaultTopicId, MessageContext, RoutedAgent,
    default_subscription, message_handler
)
from autogen_ext.runtimes.grpc import GrpcWorkerAgentRuntime

@default_subscription
class CoderAgent(RoutedAgent):
    def __init__(self):
        super().__init__("Coder")

    @message_handler
    async def handle(self, msg: ResearchResult, ctx: MessageContext) -> None:
        # Research-Ergebnis empfangen, Code generieren
        code = f"# Generated based on: {msg.content[:50]}..."
        print(f"Coder generated: {code}")

async def main():
    runtime = GrpcWorkerAgentRuntime(host_address="mac-mini.local:50051")
    await runtime.start()
    await CoderAgent.register(runtime, "coder", lambda: CoderAgent())
    await runtime.stop_when_signal()

asyncio.run(main())
\`\`\`

### Starten

\`\`\`bash
# Maschine 1 (Mac Mini)
python host.py

# Maschine 2 (Laptop)
python worker_researcher.py

# Maschine 3 (Cloud)
python worker_coder.py
\`\`\`

### Bewertung AutoGen Distributed

| Pro | Contra |
|-----|--------|
| **Einziger** nativer Multi-Machine Support | ⚠️ Experimentell — Breaking Changes erwartet |
| gRPC = schnell, typisiert, cross-language | Message Types müssen Protobuf sein |
| Topic-based Pub/Sub = flexibel | Mehr Boilerplate als CrewAI |
| Microsoft-backed | Weniger intuitive Agent-Definition |

## 6. LangGraph & Weitere

### LangGraph

- **Stärke:** Graph-basierte Orchestrierung, Durable Execution, Human-in-the-Loop
- **Multi-Machine:** Nur via **LangSmith Deployment** (Cloud-Service, kostenpflichtig)
- **Lokal verteilt:** Nicht vorgesehen — designed für zentrale Deployment-Plattform

### MetaGPT

- **Stärke:** Simuliert komplette Software-Company (PM → Architect → Engineer)
- **Multi-Machine:** ❌ Nicht unterstützt
- **Nutzen:** Gut für "eine Crew auf einer Maschine", nicht für verteilte Systeme

### OpenAI Swarm

- **Stärke:** Minimalistisch, Handoff-Pattern
- **Multi-Machine:** ❌ Experimentell, Single-Process
- **Status:** Eher Referenz-Implementierung als Production Framework

## 7. Step-by-Step: Multi-Machine Setup

### Szenario: 3-Maschinen Gamedev-Team

| Maschine | Rolle | Agent | Aufgabe |
|----------|-------|-------|---------|
| **Mac Mini** (192.168.137.148) | Orchestrator + Tech Lead | PRISM | Koordination, Coding, Git |
| **Laptop** (mobil) | Creative Lead | ADy | Design, Art Direction, Lore |
| **Cloud/VPS** | Researcher | Scout | Web Research, Docs, Trends |

### Ansatz A: A2A Protocol (Framework-agnostisch)

Dies ist der zukunftssicherste Ansatz — funktioniert mit jedem Framework.

#### Schritt 1: A2A SDK installieren (alle Maschinen)

\`\`\`bash
pip install a2a-sdk
\`\`\`

#### Schritt 2: Agent Cards definieren

\`\`\`json
// Mac Mini — prism-agent-card.json
{
  "name": "PRISM",
  "description": "Tech Lead & Orchestrator for MMC game development",
  "url": "http://192.168.137.148:9000/a2a",
  "version": "1.0.0",
  "skills": [
    {"id": "coding", "name": "Godot Coding", "description": "Write and review GDScript"},
    {"id": "architecture", "name": "Architecture", "description": "System design and planning"},
    {"id": "git", "name": "Git Operations", "description": "Commits, branches, merges"}
  ],
  "capabilities": {
    "streaming": true,
    "pushNotifications": false
  },
  "authentication": {
    "schemes": ["bearer"]
  }
}
\`\`\`

#### Schritt 3: A2A Server implementieren (jede Maschine)

\`\`\`python
# Jede Maschine — a2a_agent.py
from a2a import A2AServer, AgentCard, Task, Message

class GamedevAgent(A2AServer):
    def __init__(self, card_path, handler_fn):
        card = AgentCard.from_file(card_path)
        super().__init__(card)
        self.handler = handler_fn

    async def on_message(self, message: Message) -> Task:
        result = await self.handler(message)
        return Task(status="completed", artifacts=[result])

# Start
agent = GamedevAgent("agent-card.json", my_handler)
agent.serve(host="0.0.0.0", port=9000)
\`\`\`

#### Schritt 4: Orchestrator (Mac Mini)

\`\`\`python
# orchestrator.py
from a2a import A2AClient

# Discovery: Agents finden
prism = A2AClient("http://localhost:9000/a2a")
ady = A2AClient("http://laptop.local:9000/a2a")
scout = A2AClient("http://vps.example.com:9000/a2a")

# Workflow
async def develop_feature(feature_desc):
    # 1. Scout researched
    research = await scout.send_message(
        f"Research best practices for: {feature_desc}"
    )

    # 2. ADy designed
    design = await ady.send_message(
        f"Create design spec based on research:\\n{research.result}"
    )

    # 3. PRISM implements
    code = await prism.send_message(
        f"Implement in Godot based on design:\\n{design.result}"
    )

    return code
\`\`\`

## 9. Relevanz für unser Setup (PRISM/OpenClaw)

### Was wir haben

- **Mac Mini** — PRISM läuft via OpenClaw, Telegram-Anbindung
- **ADy** — Zweiter Agent auf Telegram, aktuell aber kein separater Compute
- **OpenClaw Nodes** — Kann Geräte pairen (Phones, andere Rechner)

### Was OpenClaw schon kann

OpenClaw hat bereits Multi-Machine Features:
- **Nodes:** Gepaarte Geräte (run, invoke, camera, screen)
- **Sessions:** Sub-Agents spawnen
- **sessions_send:** Nachrichten zwischen Sessions

### Was fehlt für echte Multi-Machine Agents

1. **Eigener Compute pro Agent** — ADy bräuchte eigene Maschine/Container
2. **Persistente Agent-Prozesse** — Agents die dauerhaft laufen (nicht nur Sessions)
3. **Agent Discovery** — Automatisches Finden von Agent-Capabilities
4. **Shared State** — Gemeinsamer Zugang zu Repos, Docs, Knowledge Base

### Realistischer nächster Schritt

\`\`\`
Phase 1 (Jetzt):
├── PRISM + ADy auf Mac Mini (OpenClaw Multi-Session)
├── CrewAI für lokale Task-Crews
└── Telegram als Kommunikationskanal

Phase 2 (Nächster Monat):
├── Zweite Maschine (Laptop/VPS) für Scout-Agent
├── A2A Server auf beiden Maschinen
└── Shared Git Repo für Zustand

Phase 3 (Langfristig):
├── Vollständiges A2A Setup
├── Agent Registry für Discovery
└── MCP für Tool-Sharing (Blender, Godot, ComfyUI)
\`\`\`

## 10. Empfehlung

### Für Clay Machine Games / MMC

| Frage | Empfehlung |
|-------|------------|
| **Framework für Einzel-Maschine?** | **CrewAI** — einfachster Einstieg, YAML-Config, gut dokumentiert |
| **Protokoll für Multi-Machine?** | **A2A** — zukunftssicher, Framework-agnostisch, Google+Linux Foundation backed |
| **Wenn nur Python + experimentell OK?** | **AutoGen Distributed** — einziger nativer Multi-Machine Support |
| **Tools teilen über Maschinen?** | **MCP** — Remote MCP Server für Blender, Godot etc. |
| **Sofort starten?** | OpenClaw Sessions + CrewAI lokal, A2A später dazuschalten |

### TL;DR

1. **Kurzfristig:** CrewAI auf dem Mac Mini für lokale Agent-Teams (PRISM + ADy + Scout als Crew)
2. **Mittelfristig:** A2A Protocol für echte Multi-Machine Kommunikation
3. **MCP** für Tool-Sharing (Blender MCP Server, Godot Tools)
4. **AutoGen** nur wenn wir wirklich low-level Distributed brauchen

**A2A + MCP zusammen** ist die Killer-Combo:
- MCP = Agenten bekommen Zugang zu Tools (vertikal)
- A2A = Agenten reden miteinander (horizontal)
