## 1. Was ist n8n?

**n8n** (ausgesprochen "n-eight-n", steht für "nodemation") ist eine **Self-Hosted Workflow-Automation-Plattform** mit:

- **Visueller Node-Editor** — Drag & Drop Workflows bauen
- **400+ Integrationen** — APIs, Datenbanken, SaaS-Services
- **Native AI-Capabilities** — LangChain-basierte AI-Nodes
- **Code wenn nötig** — JavaScript/Python in jedem Node
- **Fair-Code Lizenz** — Open Source, self-hostable, Enterprise-Option

**Analogie:** n8n ist wie Zapier/Make, aber self-hosted, mit Code-Zugang und AI-native.

---

## 2. Warum n8n für uns relevant ist

### Das Problem das n8n löst

Wir haben aktuell viele lose Teile:
- PRISM (OpenClaw) auf dem Mac Mini
- ADy als separater Agent
- Telegram als Kommunikationskanal
- GitHub für Code
- Blender MCP für 3D
- ComfyUI für Bildgenerierung
- Reolink Kameras
- Diverse APIs

**n8n kann der Klebstoff sein, der alles verbindet** — ohne dass wir für jede Integration custom Code schreiben.

### Konkrete Use Cases für Clay Machine Games

| Use Case | n8n Workflow |
|----------|-------------|
| **Automatisches Asset-Processing** | Bild hochladen → ComfyUI → Nachbearbeitung → Git Commit |
| **PR Review Pipeline** | GitHub Webhook → AI Agent reviewed Code → Kommentar auf PR |
| **Daily Standup Automation** | Cron → Git Log lesen → AI Summary → Telegram an Team |
| **Bug Reports** | Telegram "Bug: ..." → GitHub Issue erstellen → Label setzen |
| **Content Pipeline** | Idee in Telegram → Research Agent → Draft → Review → Publish |
| **Multi-Agent Orchestrierung** | Trigger → CrewAI Crew starten → Ergebnis an Telegram |
| **Monitoring** | Server-Status prüfen → Alert bei Problemen |
| **News Aggregation** | RSS Feeds → AI Filter → Zusammenfassung → Hub/Telegram |

## 3. Kernfeatures

### Visual Workflow Builder
\`\`\`
[Trigger] → [Node] → [Node] → [Output]
    │           │
    └── [If] ──┤
               └── [Alternative Path]
\`\`\`

Jeder Node ist eine Aktion: HTTP Request, Code ausführen, AI Agent aufrufen, Datenbank abfragen, etc.

### Trigger-Typen
- **Webhooks** — Reagiert auf HTTP Requests (GitHub, Telegram, etc.)
- **Cron/Schedule** — Zeitgesteuerte Ausführung
- **Events** — Reagiert auf Änderungen (DB, Dateisystem)
- **Manual** — Button-Click im Editor
- **Chat Trigger** — Für AI Chat-Workflows

### Code-Integration
\`\`\`javascript
// In jedem Node: JavaScript oder Python
const items = $input.all();
const processed = items.map(item => ({
  ...item,
  json: {
    summary: item.json.content.substring(0, 200),
    timestamp: new Date().toISOString()
  }
}));
return processed;
\`\`\`

### Error Handling
- Retry-Logik pro Node
- Error-Workflows (separater Workflow bei Fehler)
- Timeout-Konfiguration
- Human Fallback (Workflow pausiert, wartet auf Mensch)

### Sub-Workflows
Workflows können andere Workflows aufrufen — ermöglicht modulare Architektur:
\`\`\`
Main Workflow
  ├── Sub: Research Workflow
  ├── Sub: Code Review Workflow
  └── Sub: Notification Workflow
\`\`\`

## 4. AI & LangChain Integration

n8n hat **native AI-Nodes** basierend auf LangChain:

### AI Agent Node
Erstellt einen autonomen AI-Agenten mit:
- **LLM** (Claude, GPT, Ollama, etc.)
- **Tools** (HTTP, Code, Datenbank-Abfragen)
- **Memory** (Buffer, Window, Vector Store)
- **Output Parser** (Strukturierte Outputs)

### Cluster Nodes (Root + Sub-Nodes)
\`\`\`
[AI Agent] ← Root Node
    ├── [LLM: Claude Sonnet] ← Sub-Node
    ├── [Tool: Web Search] ← Sub-Node
    ├── [Tool: n8n Workflow] ← Sub-Node (!)
    └── [Memory: Buffer] ← Sub-Node
\`\`\`

**Besonders mächtig:** Ein AI Agent kann andere n8n Workflows als Tools nutzen. Das heißt:
- Agent entscheidet → "Ich brauche Daten aus GitHub" → Workflow wird ausgeführt → Ergebnis zurück an Agent

### Vector Store Integration
- Pinecone, Qdrant, Supabase, In-Memory
- Dokumente laden, embedden, RAG-Pipeline aufbauen

### Chat Trigger
- Eingebauter Chat-Trigger für Conversational AI
- Chat Widget als Frontend deploybar

## 5. n8n vs andere Ansätze

| | **n8n** | **CrewAI** | **A2A Protocol** | **OpenClaw** |
|---|---------|-----------|-----------------|-------------|
| **Zweck** | Workflow Automation | Agent Framework | Agent Kommunikation | Agent Runtime |
| **Visual Editor** | ✅ Ja | ❌ Nein | ❌ Nein | ❌ Nein |
| **AI Native** | ✅ LangChain | ✅ Multi-Agent | ❌ Transport-Layer | ✅ LLM-basiert |
| **400+ Integrations** | ✅ | ❌ | ❌ | ❌ |
| **Self-Hosted** | ✅ | ✅ | ✅ | ✅ |
| **Multi-Machine** | ✅ (via Webhooks) | ❌ | ✅ (designt dafür) | ✅ (Nodes) |
| **Code-Flexibilität** | JS/Python in Nodes | Python | Jede Sprache | Jede Sprache |
| **Lernkurve** | 🟢 Niedrig (UI) | 🟢 Niedrig | 🟡 Mittel | 🟡 Mittel |

### Fazit: n8n ist kein Ersatz, sondern eine Ergänzung

- **CrewAI** = definiert WIE Agenten zusammenarbeiten
- **A2A** = definiert WIE Agenten kommunizieren
- **OpenClaw** = definiert WO Agenten laufen
- **n8n** = **verbindet alles** und automatisiert die Workflows drumherum

## 6. Step-by-Step: Setup auf Mac Mini

### Option A: npx (Schnellstart)

\`\`\`bash
# Einmalig testen
npx n8n
# → http://localhost:5678
\`\`\`

### Option B: npm (Permanent)

\`\`\`bash
# Global installieren
npm install n8n -g

# Starten
n8n start

# Mit Tunnel (für externe Webhooks, nur Dev!)
n8n start --tunnel
\`\`\`

### Option C: Docker (Empfohlen für Production)

\`\`\`bash
# Volume für persistente Daten
docker volume create n8n_data

# Starten
docker run -d \\
  --name n8n \\
  --restart unless-stopped \\
  -p 5678:5678 \\
  -v n8n_data:/home/node/.n8n \\
  -e N8N_BASIC_AUTH_ACTIVE=true \\
  -e N8N_BASIC_AUTH_USER=druid \\
  -e N8N_BASIC_AUTH_PASSWORD=dein-passwort \\
  docker.n8n.io/n8nio/n8n

# → http://localhost:5678
# → LAN: http://your-mac-mini.local:5678
\`\`\`

### Option D: Docker Compose (mit Postgres)

\`\`\`yaml
# docker-compose.yml
version: '3.8'
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=druid
      - N8N_BASIC_AUTH_PASSWORD=dein-passwort
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  n8n_data:
  postgres_data:
\`\`\`

\`\`\`bash
docker compose up -d
\`\`\`

### Nach der Installation

1. Browser öffnen: \`http://localhost:5678\`
2. Account erstellen (Owner)
3. Ersten Workflow erstellen
4. API-Keys konfigurieren (Anthropic, OpenAI, etc.)

## 7. Beispiel-Workflows für unser Setup

### Workflow 1: Daily Dev Standup

\`\`\`
[Schedule Trigger: 09:00 Mo-Fr]
  → [Execute Command: git log --since="yesterday" --oneline]
  → [AI Agent: Fasse die Commits zusammen]
  → [Telegram: Sende Summary an Druid]
\`\`\`

**Konfiguration:**
- Schedule: Cron \`0 9 * * 1-5\`
- Execute Command Node: Arbeitsverzeichnis = MMC Repo
- AI Agent: Claude Sonnet, System Prompt = "Du bist ein Dev-Lead..."
- Telegram: Bot Token + Chat ID

### Workflow 2: GitHub Issue aus Telegram

\`\`\`
[Telegram Trigger: Nachricht mit "Bug:"]
  → [Code: Bug-Beschreibung extrahieren]
  → [AI Agent: Titel + Labels vorschlagen]
  → [GitHub: Issue erstellen]
  → [Telegram: Bestätigung mit Issue-Link]
\`\`\`

### Workflow 3: AI Research Pipeline

\`\`\`
[Webhook Trigger: POST /research]
  → [AI Agent: Web Research mit Tools]
      ├── [Tool: HTTP Request (Web Fetch)]
      ├── [Tool: n8n Workflow (Zusammenfassung)]
      └── [Tool: Code (Markdown formatieren)]
  → [Write File: research/{topic}.md]
  → [Telegram: "Research fertig: {link}"]
\`\`\`

### Workflow 4: Multi-Agent Orchestrierung

\`\`\`
[Webhook: /develop-feature]
  → [HTTP Request: POST zu Scout Agent (A2A)]
  → [Wait: Auf Research-Ergebnis]
  → [HTTP Request: POST zu ADy Agent (A2A)]
  → [Wait: Auf Design-Ergebnis]
  → [AI Agent: PRISM implementiert]
  → [Execute Command: git add, commit, push]
  → [Telegram: "Feature implementiert!"]
\`\`\`

### Workflow 5: Asset Pipeline

\`\`\`
[Webhook: Neues Asset]
  → [If: Bild oder 3D?]
  ├── [Bild] → [HTTP: ComfyUI API] → [Download] → [Git Commit]
  └── [3D]  → [HTTP: Blender MCP] → [Export GLB] → [Git Commit]
  → [Telegram: "Asset verarbeitet"]
\`\`\`

## 8. Integration mit CrewAI / A2A / OpenClaw

### n8n + CrewAI

n8n kann CrewAI-Crews als Sub-Prozesse starten:

\`\`\`
[n8n Trigger]
  → [Execute Command: python run_crew.py --task "..."]
  → [Parse Output]
  → [Weiterverarbeiten]
\`\`\`

Oder via HTTP wenn CrewAI als API läuft:
\`\`\`
[n8n Trigger]
  → [HTTP Request: POST http://localhost:8080/crew/kickoff]
  → [Wait for Response]
  → [Weiterverarbeiten]
\`\`\`

### n8n + A2A

n8n ist ein **perfekter A2A-Orchestrator**:
- Jeder A2A Agent ist ein HTTP Endpoint
- n8n kann HTTP Requests an Agents senden
- n8n kann Webhooks empfangen (Agent → n8n)
- n8n managed den gesamten Workflow visuell

### n8n + OpenClaw

Mögliche Integrationen:
- **Webhook → OpenClaw API** für Node-Steuerung
- **n8n als Workflow-Backend** für PRISM-Aufgaben
- **Telegram Bot** kann sowohl in OpenClaw als auch in n8n laufen

## 10. Empfehlung

### Relevanz für Clay Machine Games: ⭐⭐⭐⭐ (Hoch)

**n8n ist hochrelevant** — aber als **Ergänzung**, nicht als Ersatz für unseren Agent-Stack.

### Was n8n für uns löst

| Problem | n8n Lösung |
|---------|-----------|
| Viele lose Services verbinden | Visueller Workflow-Editor mit 400+ Integrationen |
| Repetitive Automationen | Schedule + Trigger-basierte Workflows |
| Agent-Orchestrierung | HTTP Nodes als A2A/CrewAI Trigger |
| Monitoring & Alerts | Error Workflows + Telegram Notifications |
| Non-Dev Zugänglichkeit | Visual UI — auch ohne Python nutzbar |

### Was n8n NICHT löst

- Ersetzt nicht CrewAI/AutoGen für Agent-Definition
- Ersetzt nicht A2A für Agent-Protokoll
- Ersetzt nicht OpenClaw/PRISM als Agent-Runtime
- Kein nativer Multi-Agent-Teamwork (Agenten die miteinander "diskutieren")

### Empfohlener Einsatz

\`\`\`
Phase 1 (Sofort machbar):
├── n8n auf Mac Mini installieren (Docker)
├── Daily Standup Workflow (Git → AI → Telegram)
├── Bug-Report Workflow (Telegram → GitHub)
└── News Aggregation (RSS → AI → Hub)

Phase 2 (Mit Agent-Stack):
├── n8n als Orchestrator für CrewAI Crews
├── A2A Agent Endpoints via HTTP Nodes ansprechen
└── Asset Pipeline (ComfyUI/Blender Integration)

Phase 3 (Production):
├── Vollständige CI/CD Pipeline
├── Multi-Agent Workflows visuell orchestriert
└── Monitoring Dashboard in n8n
\`\`\`

### TL;DR

**n8n installieren, ja!** Es ist der fehlende **Workflow-Orchestrator** zwischen unseren Agenten, Tools und Services. Kostenlos, self-hosted, visuell, AI-native. Ergänzt CrewAI + A2A + OpenClaw perfekt.

**Nächster Schritt:** \`npx n8n\` auf dem Mac Mini und den ersten Workflow bauen (z.B. Daily Standup Automation).
