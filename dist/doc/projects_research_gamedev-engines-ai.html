## 1. Game Engines im Überblick

### 1.1 Godot Engine

| Aspekt | Details |
|---|---|
| **Sprache** | GDScript (Python-ähnlich), C#/.NET, C++, GDExtension |
| **Kosten** | 100% kostenlos, MIT-Lizenz. Keine Revenue-Shares, keine Gebühren. Punkt. |
| **AI-Tool-Support** | ⭐⭐⭐⭐ Sehr gut |
| **LLM-Integration** | Gut — GDScript ist simpel genug, dass LLMs es zuverlässig generieren |
| **Automatisierungsgrad** | Hoch — textbasierte Scene-Files (.tscn), CLI-Export, Headless-Modus |
| **Community** | Explodiert seit 2023/Unity-Debakel. Sehr aktiv, hilfsbereit |

**Warum Godot für AI ideal ist:**
- **Textbasierte Projektdateien:** \`.tscn\` und \`.tres\` Dateien sind menschenlesbar (und damit LLM-lesbar). Ein AI-Agent kann Scenes direkt als Text generieren/editieren — ohne den Editor zu öffnen.
- **GDScript ist simpel:** Wenig Boilerplate, Python-ähnliche Syntax. LLMs (Claude, GPT-4, Gemini) generieren GDScript mit hoher Zuverlässigkeit.
- **Headless/CLI:** \`godot --headless --export-release\` funktioniert. CI/CD-Pipelines ohne GUI möglich.
- **Keine Lock-in-Kosten:** MIT-Lizenz = komplett frei. Kein Risiko wie bei Unity's Preisänderungen.
- **Kleine Binary:** Der Editor ist ~40MB. Schnell aufgesetzt, schnell iteriert.

**AI-spezifische Plugins/Tools:**
- **Noko** (GitHub: nthnn/noko) — Godot-Plugin für Ollama-Integration. Ermöglicht lokale LLM-NPCs direkt im Spiel.
- **local-llm-npc** (code-forge-temple) — Gemma 3n Integration für interaktive NPCs in Godot (C#).
- **godot-lsp-stdio-bridge** — LSP-Bridge für AI-Coding-Assistenten, damit Cursor/Copilot besser mit GDScript arbeiten.
- **Cursor/Windsurf/Copilot:** Funktionieren mit GDScript, aber nicht perfekt. GDScript-Trainingsdaten sind kleiner als für C# oder Python.

**Einschränkungen:**
- 3D ist funktional, aber nicht auf Unreal-Niveau
- Console-Export (Switch, PS5) braucht Third-Party-Portierungsfirmen (W4 Games bietet das an)
- Weniger Asset-Store-Inhalte als Unity

---

### 1.2 Unity

| Aspekt | Details |
|---|---|
| **Sprache** | C# |
| **Kosten** | Personal: Kostenlos bis $200K Revenue. Pro: $2.040/Jahr. Kein Runtime-Fee mehr (nach Rücknahme 2024) |
| **AI-Tool-Support** | ⭐⭐⭐⭐ Gut |
| **LLM-Integration** | Sehr gut — C# ist extrem gut in LLM-Trainingsdaten vertreten |
| **Automatisierungsgrad** | Mittel-Hoch — Binary Scene-Files, aber gute CLI/Scripting API |
| **Community** | Riesig, aber seit 2023 Vertrauenskrise. Viele wandern zu Godot ab |

**Unity AI Features (offiziell):**
- **Unity Muse** (jetzt Teil von Unity 6+): AI-Assistent im Editor. Kann Texturen generieren, Code-Vorschläge machen, Sprites erstellen. Qualität: okay für Prototyping, nicht production-ready.
- **Unity Sentis:** ML-Inference-Runtime direkt in Unity. Kann ONNX-Modelle ausführen — für In-Game-AI (nicht für Entwicklungs-AI).
- **C# = LLM-Goldstandard:** Claude, GPT-4 und Co. können C# extrem gut. Mehr Stackoverflow-Antworten, mehr Trainingsdaten = bessere Codegen.

**Warum trotzdem problematisch für AI-First:**
- **Binary Scene-Files:** Unity-Scenes sind nicht sinnvoll von außen editierbar. Du brauchst den Editor.
- **Bloat:** Unity-Projekte werden schnell groß und komplex. Viel Boilerplate.
- **Vertrauensproblem:** Nach dem Runtime-Fee-Desaster 2023 ist das Vertrauen bei Indie-Devs nachhaltig beschädigt.
- **Closed Source:** Du bist von Unity Technologies abhängig.

**Ehrliche Einschätzung:** Unity hat die beste LLM-Codegen-Qualität (wegen C#), aber das Ökosystem ist für einen AI-First-Workflow weniger geeignet als Godot, weil die Projektstruktur nicht textbasiert ist.

---

### 1.3 Unreal Engine

| Aspekt | Details |
|---|---|
| **Sprache** | C++, Blueprints (visuell) |
| **Kosten** | Kostenlos bis $1M Revenue, dann 5% Royalties |
| **AI-Tool-Support** | ⭐⭐ Begrenzt |
| **LLM-Integration** | Schlecht für AI-Automatisierung |
| **Automatisierungsgrad** | Niedrig — Blueprints sind visuell, C++ ist komplex |
| **Community** | Riesig, aber AAA-fokussiert |

**Das Problem mit Unreal + AI:**
- **Blueprints:** Visuelle Scripting-Nodes. LLMs können Blueprints nicht direkt generieren — es sind binäre Assets, keine Textdateien.
- **C++:** Ja, LLMs können C++ generieren. Aber Unreal-C++ ist ein eigenes Beast — UE-spezifische Makros (UCLASS, UPROPERTY, etc.), Build-System-Komplexität, lange Compile-Zeiten.
- **Overkill für Indie:** Unreal ist für AAA-3D-Spiele gebaut. Für 2D-Roguelites? Kanone auf Spatzen.
- **Riesige Projekte:** Ein leeres UE5-Projekt ist mehrere GB. Iteration ist langsam.

**Wann Unreal Sinn macht:** Wenn du ein visuell beeindruckendes 3D-Spiel baust und ein Team hast. Für Solo-AI-First-Dev: Finger weg.

---

### 1.4 Weitere/Nischen-Engines

#### Defold (Lua)
- **Kosten:** Kostenlos (King/Activision-backed)
- **AI-Eignung:** Mittel. Lua ist simpel, aber wenig LLM-Trainingsdaten.
- **Nische:** Mobile 2D-Spiele
- **Verdict:** Funktional, aber kleine Community. Godot ist besser.

#### Pygame / Love2D (Python / Lua)
- **AI-Eignung:** Exzellent für Prototyping! Python = beste LLM-Unterstützung überhaupt.
- **Aber:** Keine echte Engine, eher Frameworks. Du baust alles selbst. Kein Editor, kein Scene-System.
- **Verdict:** Gut für AI-generierte Game-Jams und Prototypen. Nicht für Release-Produkte.

#### Phaser (JavaScript/TypeScript)
- **AI-Eignung:** Gut — JS/TS sind top in LLM-Trainingsdaten.
- **Aber:** Web-only (oder Electron-Wraps). Für Steam-Releases suboptimal.
- **Nische:** Browser-Games, web-basierte Prototypen.

#### LÖVE / Raylib
- **Minimalistisch**, gut für Lernen, aber kein ernsthafter Konkurrent für Produktions-Engines.

## 2. Godot im Detail

### 2.1 Warum gilt Godot als anfängerfreundlich?

1. **Kleiner Editor (~40MB):** Download, entpacken, fertig. Kein Installer, kein Account, kein Login.
2. **GDScript:** Python-ähnlich, minimaler Boilerplate. \`func _ready():\` statt \`public override void OnEnable() { base.OnEnable(); }\`.
3. **Scene/Node-System:** Intuitiv. Alles ist ein Node, Nodes bilden Bäume, Bäume werden Scenes. Einfaches mentales Modell.
4. **Alles integriert:** Physik, Animation, Tilemap, Partikel, UI — alles built-in. Kein Plugin-Hunting für Basics.
5. **Gute Dokumentation:** Offizielle Docs sind solide, plus starke Community-Tutorials (GDQuest, Brackeys ist jetzt auch bei Godot).
6. **Schnelle Iteration:** Play-Button → Spiel läuft in <2 Sekunden. Kein langer Build-Prozess.

### 2.2 Godot vs Unity — Pros/Cons für Solo-Indie-Dev

| Kriterium | Godot | Unity |
|---|---|---|
| **Preis** | ✅ Komplett kostenlos, MIT | ⚠️ Kostenlos bis $200K, dann teuer |
| **2D-Engine** | ✅ Erstklassig, dedicated 2D-Pipeline | ⚠️ 2D ist "3D von oben", nicht nativ |
| **3D-Engine** | ⚠️ Okay, verbessert sich, aber nicht AAA | ✅ Sehr gut |
| **Lernkurve** | ✅ Flach, schnell produktiv | ⚠️ Steiler, mehr Konzepte zu lernen |
| **AI-Codegen** | ✅ GDScript: gut generierbar | ✅✅ C#: exzellent generierbar |
| **Projektstruktur** | ✅✅ Textbasiert, Git-freundlich | ❌ Binary Assets, Git-Probleme |
| **Asset Store** | ⚠️ Kleiner, aber wachsend | ✅ Riesig |
| **Console Export** | ⚠️ Über Drittanbieter (W4 Games) | ✅ Nativ |
| **Steam Export** | ✅ Direkt, unkompliziert | ✅ Direkt |
| **Editor-Größe** | ✅ ~40MB | ❌ ~10-15GB+ |
| **Open Source** | ✅ MIT-Lizenz, vollständig | ❌ Proprietär |
| **Stabilität** | ⚠️ Godot 4 hatte anfangs Bugs, jetzt stabil | ✅ Jahrelang gereift |
| **Multiplayer** | ⚠️ Built-in, aber weniger mature | ✅ Netcode, Relay, etc. |

**Bottom Line:** Für 2D-Indie-Games ist Godot die bessere Wahl. Für 3D-AAA-artige Projekte: Unity (oder Unreal). Für AI-First-Workflow: Godot gewinnt wegen textbasierter Dateien.

### 2.3 Godot + AI: Plugins, LLM-Integration, Automatisierung

**Code-Generierung mit LLMs:**
- GDScript wird von Claude, GPT-4, Gemini gut unterstützt. Nicht so perfekt wie Python/C#, aber für die meisten Aufgaben ausreichend.
- **Tipp:** In deinem System-Prompt die Godot-4-API-Referenz referenzieren. LLMs verwechseln gerne Godot 3 und 4 Syntax.
- **Cursor + GDScript:** Funktioniert mit der godot-lsp-stdio-bridge. Nicht perfekt, aber brauchbar.

**In-Game AI (NPCs etc.):**
- **Noko Plugin:** Ollama-Anbindung direkt in Godot. Lokale LLMs für dynamische NPC-Dialoge.
- **HTTP-Requests:** GDScript hat \`HTTPRequest\`-Node. API-Calls zu OpenAI/Anthropic/etc. trivial implementierbar.
- **GDExtension:** Für Performance-kritische AI (z.B. lokale Inference) kannst du C/C++/Rust-Extensions laden.

**Automatisierte Asset-Generierung:**
- **Sprites/Textures:** Stable Diffusion / DALL-E → direkte Import als .png
- **Tilemaps:** AI kann Tilemap-Daten als .tscn-Text generieren
- **Sound:** ElevenLabs / Bark für SFX, Suno/Udio für Musik
- **Level-Design:** Prozedurale Generation + LLM für Regelsets = machbar

**Scene-Generierung per AI:**
\`\`\`
# Eine Godot .tscn Datei ist einfach Text:
[gd_scene load_steps=2 format=3]

[ext_resource type="Script" path="res://player.gd" id="1"]

[node name="Player" type="CharacterBody2D"]
script = ExtResource("1")

[node name="Sprite" type="Sprite2D" parent="."]

[node name="CollisionShape" type="CollisionShape2D" parent="."]
\`\`\`
→ Ein LLM kann das direkt generieren! Das ist Godots Killer-Feature für AI-Workflows.

### 2.4 Godot für 2D Top-Down Roguelites

**Eignung: ⭐⭐⭐⭐⭐ Exzellent**

Godot hat alles was du brauchst:
- **TileMapLayer** (Godot 4.3+): Perfekt für Top-Down-Maps mit Autotiling
- **CharacterBody2D:** Für Spieler und Gegner mit eingebauter Physik
- **NavigationAgent2D:** Pathfinding für Gegner
- **AnimationPlayer + AnimatedSprite2D:** Für Charakter-Animationen
- **Prozedurale Generation:** GDScript ist schnell genug für Dungeon-Generation
- **Partikel-System:** GPU-Partikel für Effekte

**Bewährte Godot-Roguelites:**
- **Halls of Torment** — Top-Down Survivors-like, sehr erfolgreich auf Steam, gemacht mit Godot
- **Brotato** — Godot, großer Erfolg
- **Dome Keeper** — Godot

Das Genre ist quasi Godots Heimspiel.

### 2.5 GDScript vs C# in Godot

| Kriterium | GDScript | C# (.NET) |
|---|---|---|
| **Lernkurve** | ✅ Sehr einfach | ⚠️ Steiler (OOP, Typsystem) |
| **Performance** | Ausreichend für 2D | ✅ Schneller bei heavy computation |
| **AI-Codegen** | ✅ Gut | ✅✅ Exzellent (mehr Trainingsdaten) |
| **Engine-Integration** | ✅✅ Erstklassig, alle Tutorials | ⚠️ Gelegentlich Docs-Lücken |
| **Tooling** | ⚠️ Godot-Editor only | ✅ VS Code, Rider, etc. |
| **Community** | ✅ Größte Godot-Community | ⚠️ Kleiner, aber wachsend |
| **Textbasiert** | ✅ .gd Dateien, simpel | ✅ .cs Dateien, standard |
| **Zukunft** | ✅ Wird von Godot-Team gepflegt | ✅ .NET-Ökosystem ist riesig |

**Empfehlung für AI-First:**
- **GDScript** wenn du schnell iterieren willst und die Engine-Integration reibungslos sein soll.
- **C#** wenn du maximale AI-Codegen-Qualität willst und schon C#-Erfahrung hast.
- **Pragmatisch:** Starte mit GDScript. Wenn du merkst, dass LLMs zu viele GDScript-Fehler machen, wechsle auf C#. In Godot 4 kannst du beide Sprachen im selben Projekt mischen.

### 2.6 Export zu Steam

**Prozess:**
1. **Steamworks-Account erstellen:** $100 einmalig pro Spiel (Steam Direct Fee)
2. **Steamworks SDK:** Für Achievements, Leaderboards etc. → **GodotSteam** Plugin (Open Source, gut maintained)
3. **Export in Godot:**
   - Export-Presets für Windows, Linux, macOS anlegen
   - \`Project → Export → Add Preset → Windows Desktop\`
   - Oder CLI: \`godot --headless --export-release "Windows" build/game.exe\`
4. **Upload zu Steam:** Über SteamPipe (Steamworks CLI-Tool) oder den Steam-Partner-Upload
5. **Store Page:** Screenshots, Beschreibung, Tags etc. im Steamworks-Dashboard

**Fallstricke:**
- macOS-Export braucht Code-Signing (Apple Developer Account, $99/Jahr) — optional aber empfohlen
- Steam Deck: Godot-Spiele laufen meistens out-of-the-box auf Linux/Steam Deck
- GodotSteam muss als GDExtension eingebunden werden, nicht schwer aber ein Extra-Schritt

**Automatisierbar?** Ja! Der gesamte Build+Upload-Prozess kann per CLI scripted werden. Perfekt für AI-gesteuerte Pipelines.

## 3. AI-First Game Engines & Text-to-Game

### 3.1 Rosebud AI

**Was ist es:** Browser-basierte Plattform zum "Vibe Coding" von Spielen. Du beschreibst dein Spiel in natürlicher Sprache, Rosebud generiert den Code.

**Stand Feb 2026:**
- Über 2 Millionen "vibe coded" Games erstellt
- Unterstützt 2D und 3D
- Multiplayer-Templates verfügbar
- Nutzt Gemini als Backend

**Ehrliche Einschätzung:**
- ✅ Beeindruckend für Prototypen und Casual-Games
- ✅ Keine Installation nötig, alles im Browser
- ❌ Kein Export zu Steam möglich — Spiele laufen nur auf Rosebud's Plattform
- ❌ Begrenzte Komplexität — für ein ernsthaftes Roguelite nicht geeignet
- ❌ Vendor Lock-in: Dein Spiel lebt auf deren Plattform
- **Verdict:** Spielzeug/Prototyping-Tool. Nicht für kommerzielle Releases.

### 3.2 Weitere Text-to-Game / AI-First Plattformen

#### Google GameNGen / Genie
- Google Research hat Prototypen gezeigt die Spiele "frame by frame" per Neural Network generieren
- **Stand:** Pure Forschung. Kein nutzbares Produkt.

#### Scenario.gg
- AI-generierte Game-Assets (Sprites, Textures, Concept Art)
- Trainierbare Modelle für konsistenten Art-Style
- **Nützlich als Tool**, aber keine Engine

#### InWorld AI
- AI-NPCs mit Persönlichkeit, Erinnerung, Emotionen
- Integration in Unity/Unreal
- **Nische:** NPC-Dialoge, nicht ganze Spiele

#### Luma AI / Meshy / Tripo
- 3D-Asset-Generierung aus Text/Bildern
- Qualität wird besser, aber noch nicht Production-ready für die meisten Styles

### 3.3 Wie weit ist "Prompte ein ganzes Spiel" realistisch?

**Ehrliche Antwort (Feb 2026):**

**Was funktioniert:**
- ✅ Einfache Casual-Games (Flappy Bird, Pong, Snake) — ja, promptbar in Minuten
- ✅ Game-Jam-Prototypen — brauchbar in Stunden
- ✅ Einzelne Systeme (Inventar, Kampf, Pathfinding) — LLMs generieren das zuverlässig
- ✅ Art Assets — Sprites, Tilesets via Stable Diffusion sind production-nutzbar
- ✅ Musik/Sound — AI-generiert, Qualität ist akzeptabel bis gut

**Was NICHT funktioniert:**
- ❌ Ein komplettes, poliertes Roguelite mit 20h Content aus einem Prompt — vergiss es
- ❌ Komplexe Gameplay-Loops die sich "gut anfühlen" — Game Feel braucht menschliches Tuning
- ❌ Balancing — AI kann keine 50 Items balancen, das braucht Playtesting
- ❌ Bug-freier Code über >5000 Zeilen — LLMs verlieren bei großen Codebases den Überblick

**Realistisches Bild:**
AI ist ein **10x Produktivitäts-Multiplikator**, kein **100x**. Du kannst als Solo-Dev mit AI in 3 Monaten schaffen, was früher 12 Monate gedauert hätte. Aber du brauchst immer noch Verständnis für Game Design, du musst AI-Output reviewen und korrigieren, und der letzte Feinschliff ist Handarbeit.

**Die magische Zahl:** ~60-70% des Codes können von AI generiert werden. Die restlichen 30-40% sind Debugging, Integration, Tuning und die Stellen wo AI halluziniert.

## 4. Empfehlung: AI-gesteuerte Game-Dev Pipeline

### 4.1 Beste Engine für AI-First Solo-Dev

## 🏆 Godot 4 — Klarer Gewinner

**Warum:**
1. **Textbasierte Dateien** = AI kann Scenes, Resources und Code direkt generieren
2. **Kostenlos** = Null Risiko, null Overhead
3. **GDScript** = Simpel genug für zuverlässige AI-Codegen
4. **2D erstklassig** = Perfekt für Roguelites
5. **CLI/Headless** = Automatisierte Builds möglich
6. **Open Source** = Kein Vendor Lock-in, Community-Plugins
7. **Erfolgreiche Roguelites** = Bewährte Engine für dein Genre

### 4.3 Konkrete Workflow-Empfehlung

**Phase 1: Design (1-2 Wochen)**
- Claude/GPT-4 nutzen um Game Design Document zu erstellen
- Mechaniken, Items, Gegner-Typen, Progression — alles als strukturierte Daten (JSON/CSV)
- AI generiert Balancing-Tabellen als Startpunkt

**Phase 2: Prototyp (2-4 Wochen)**
- Godot 4 + Cursor/Claude
- Core Gameplay Loop implementieren: Bewegung, Kampf, ein Raum
- AI generiert ~70% des Codes, du fixst und integrierst
- Greybox-Art (farbige Rechtecke) — erstmal Gameplay

**Phase 3: Content & Art (4-8 Wochen)**
- Stable Diffusion für Art Style finden + Sprites generieren
- AI-generierte Tilesets → manuelles Cleanup in Aseprite
- Level-Generation per Code (AI-geschrieben)
- Items, Gegner, Bosse — Daten aus Phase 1, Code von AI

**Phase 4: Polish (2-4 Wochen)**
- Game Feel tuning — das ist der Teil den AI NICHT kann
- Screen Shake, Hitstop, Partikel-Effekte, Sound-Feedback
- Playtesting (selbst + Friends/Family/Discord)
- Bug-Fixing (AI hilft beim Debuggen, aber du musst die Bugs finden)

**Phase 5: Release (1-2 Wochen)**
- Steam-Page einrichten
- GodotSteam für Achievements
- Export + Upload via CLI
- Marketing: AI-generierte Trailer-Skripte, Store-Texte

### 4.4 Budget-Übersicht

| Posten | Kosten |

| Godot Engine | 0€ |
| Steam Direct Fee | ~93€ ($100) |
| Claude Pro / ChatGPT Plus | ~20€/Monat |
| Cursor Pro | ~20€/Monat |
| Stable Diffusion (lokal) | 0€ (wenn GPU vorhanden) |
| Aseprite | 18€ (einmalig, Steam) |
| Suno/Udio (Musik) | 0-10€/Monat |
| Apple Developer (macOS) | 92€/Jahr (optional) |
| **Gesamt (Minimum)** | **~150-200€ + ~40€/Monat** |

### 4.5 Risiken & Realitätscheck

⚠️ **AI-generierter Code hat Bugs.** Immer. Reviewe alles.

⚠️ **Art-Konsistenz ist schwer.** AI-generierte Sprites sehen einzeln gut aus, aber passen stilistisch oft nicht zusammen. Plan für manuelles Cleanup ein.

⚠️ **GDScript-Trainingsdaten sind begrenzter** als Python/C#. Erwarte mehr Halluzinationen bei Engine-spezifischen APIs. Halte die Godot-Docs offen.

⚠️ **"Vibe Coding" skaliert nicht.** Für die ersten 2000 Zeilen ist es magisch. Ab 5000+ Zeilen musst du verstehen was der Code tut, sonst versinkst du in Bugs.

⚠️ **Urheberrecht:** AI-generierte Assets befinden sich in einer rechtlichen Grauzone. Für kommerzielle Releases empfiehlt sich Dokumentation des Erstellungsprozesses und Modifikation der AI-Outputs.

---

## Fazit

**Für einen Solo-Indie-Dev der ein 2D Top-Down Roguelite mit AI-First Ansatz bauen will, ist Godot 4 + GDScript + Claude/Cursor die optimale Kombination.** Die textbasierte Projektstruktur, die Kostenfreiheit, die bewährte 2D-Pipeline und die wachsende Community machen es zur besten Wahl.

"Prompte ein ganzes Spiel" ist 2026 immer noch Science Fiction für alles über Casual-Game-Niveau. Aber "AI als 10x-Produktivitäts-Boost für einen kompetenten Solo-Dev" — das ist real und funktioniert heute.

Die wichtigste Investition ist nicht das Tooling, sondern **dein Verständnis von Game Design und der Engine.** AI macht dich schneller, nicht klüger. Lerne Godot's Grundlagen (2-3 Wochen Tutorial), dann lass AI die Schreibarbeit übernehmen.
