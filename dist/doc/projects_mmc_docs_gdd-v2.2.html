## 1. Executive Summary

### Elevator Pitch

**Meat Machine Cycle** ist ein satirischer Cyberpunk-Roguelite mit Top-Down-Perspektive, 32×32 Pixel-Art und Twin-Stick-Steuerung. Du spielst eine "Meat Machine" — halb Mensch, halb Billig-Implantat — gefangen im endlosen Arbeitszyklus eines dystopischen Megakonzerns. Upgrade dich mit absurden Waffen aus Haushaltsgeräten, kämpfe dich durch prozedural generierte Büro-Dungeons, stirb, werde auf Firmenkredit reanimiert, und versuch es nochmal.

> *"Upgrade. Die. Repeat. Mostly die."*

### Unique Selling Points

- **Corporate-Satire als Weltenbau**: Keine generische Cyberpunk-Dystopie, sondern deutsche Bürokratie-Hölle mit Mega-Corp-Wahnsinn. Jedes System im Spiel ist als Firmenprozess verkleidet.
- **Absurde Waffen mit echtem Gameplay-Depth**: Toaster-Arm, Büro-Tacker, Kettensägen-Regenschirm — jede Waffe hat einzigartige Mechaniken und Synergien.
- **Tiefes Upgrade-Synergie-System**: 5 Tag-Kategorien (FLESH, CHROME, NERVE, VOLT, GLITCH) mit Set-Boni, Stacking-Regeln und Diminishing Returns.
- **One-More-Run-Compulsion**: Schnelle Runs (25–35 Min.), sofortige Meta-Belohnung bei Tod, ständig neue Unlocks.

### Zielgruppe

- Fans von: Hades, Enter the Gungeon, Vampire Survivors, The Binding of Isaac, Slay the Spire
- Alter: 16–35
- Humor-Affinität: Office Space, Idiocracy, deutsche Bürokratie-Satire
- Plattform-Erwartung: Steam (Keyboard+Maus primär, Gamepad unterstützt)

### Technische Eckdaten

| Parameter | Wert |

| Engine | Godot 4.6 |
| Sprache | GDScript |
| Art-Style | 32×32 Pixel Art, Neon-Urban-Satire-Palette |

| Steuerung | WASD + Maus-Aim (Twin-Stick) |
| Ziel-Framerate | 60 FPS |
| Ziel-Runlänge | 25–35 Minuten (Full Clear) |
| Ziel-Biome | 4 Biome à 10 Räume + Boss |

## 2. Game Pillars

Jedes Feature, jede Mechanik und jede Design-Entscheidung muss mindestens einen dieser Pfeiler bedienen. Wenn ein Feature keinen Pfeiler stärkt, gehört es nicht ins Spiel.

### Pfeiler 1: Corporate Absurdity

Die Welt nimmt sich todernst. Der Humor entsteht daraus, dass *alles* — vom Tod bis zur Waffe — ein bürokratischer Firmenprozess ist. Kein Cringe-Humor, kein "LOL RANDOM". Stattdessen: trocken, deutsch, präzise absurd.

### Pfeiler 2: Meaningful Choices

Jede Entscheidung zählt. Upgrade-Auswahl, Pfad auf der Map, Event-Choices, Waffen-Wechsel — der Spieler muss ständig Trade-offs abwägen. Keine "offensichtlich besten" Optionen.

### Pfeiler 3: One-More-Run-Compulsion

Der Zyklus Tod → Belohnung → Neuer Run muss unter 90 Sekunden dauern. Jeder Tod fühlt sich wie Fortschritt an. Frühe Meta-Unlocks kommen schnell, späte verlangen Investition.

### Pfeiler 4: Tight Combat Feel

Responsives Gameplay mit Frame-genauen Hitboxen, sauberen I-Frames, befriedigenden Hits und klaren Feedback-Loops. Das Spiel muss sich *gut anfühlen*, bevor es lustig sein darf.

### Pfeiler 5: Build Diversity

Kein Run spielt sich gleich. Das Synergie-System belohnt Experimentieren und bestraft Tunnel-Vision. Jede Charakter-Upgrade-Kombination soll eine eigene Spielerfahrung erzeugen.

## 3. Tone & Setting

### Die Welt: Neo-Regensburg, 2089

Die Stadt wird von Mega-Konzernen regiert, die alles privatisiert haben — inklusive Organe, Gedanken und Mikrowellen. Jeder Bürger ist eine "Meat Machine" — halb Mensch, halb billiges Implantat vom Discounter.

Der "Cycle" ist das tägliche Ritual: Aufstehen, Kämpfen, Sterben, von der Firma reanimiert werden (auf Kredit natürlich), und wieder von vorn. Dein Arbeitsvertrag endet erst, wenn du die Schulden abbezahlt hast. Spoiler: Das passiert nie.

### Fraktionen

| Fraktion | Rolle | Ästhetik |
|----------|-------|----------|
| **MeatCorp™** | Der Arbeitgeber. Betreibt den Cycle. | Corporate-Blau, sterile Büros, Motivationsposter |
| **FleshTek Industries** | Konkurrenz. Liefert die Billig-Implantate. | Neon-Grün, organisch-technisch, Laborästhetik |
| **Die Papierlosen** | Untergrund-Widerstand. Ex-Angestellte ohne Vertrag. | Rostbraun, DIY, Kabelsalat |
| **Der Server** | Die KI hinter allem. Vielleicht. | Glitch-Ästhetik, digitale Artefakte |

### Humor-Style

- **Satirisch**: Mega-Corps, Konsumkritik, Bürokratie-Wahnsinn
- **Absurd**: Waffen aus Haushaltsgeräten, Skills die keinen Sinn machen aber funktionieren
- **Selbstironisch**: Das Spiel weiß, dass es ein Spiel ist. NPCs beschweren sich über RNG.
- **Deutsch-trocken**: Formulare ausfüllen bevor man den Boss bekämpfen darf

### Tone Bible — Schreibregeln

1. Alles klingt wie ein Konzern-Memo. Upgrade-Beschreibungen = Produktbeschreibungen mit Kleingedrucktem.
2. Die Welt nimmt sich ernst. Der Humor kommt daher, dass ALLES bürokratisch und corporate ist — selbst der Tod.
3. Referenzen: Office Space, Idiocracy, Cyberpunk aber wenn alles billig wäre, deutsche Bürokratie.
4. Kein Cringe-Humor. Trocken > Laut. Weniger "HAHA RANDOM", mehr "...wait, that's actually how it works."
5. NPCs sprechen in Corporate-Speak. Gegner haben Mitarbeiter-Badges.

### Beispiel-Flavor-Texte

> *"Ihr Toaster-Arm-Upgrade wurde genehmigt. Bitte beachten Sie: Garantie erlischt bei Nutzung als Flammenwerfer. Oder als Toaster."*

> *"Willkommen bei MeatCorp™. Ihr Leben gehört uns. Buchstäblich. Siehe Paragraph 47b."*

## 4. Core Gameplay Loop

### Design Intent

Der Loop besteht aus drei verschachtelten Zyklen: dem **Moment-to-Moment** (Kampf), dem **Room-to-Room** (Run) und dem **Run-to-Run** (Meta). Jeder Zyklus hat eigene Belohnungen und Entscheidungen.

### Flowchart

\`\`\`mermaid

    Start[Run Start] --> CharSelect[Character & Loadout wählen]
    CharSelect --> Map[Map-Knoten wählen]
    Map --> RoomType{Raum-Typ?}
    
    RoomType -->|Kampf| Combat[Gegner bekämpfen]
    RoomType -->|Elite| Elite[Elite-Gegner bekämpfen]
    RoomType -->|Shop| Shop[Items kaufen / verkaufen]
    RoomType -->|Event| Event[Event-Entscheidung treffen]
    RoomType -->|Ruhe| Rest[Heilen + Upgrade wählen]
    RoomType -->|Boss| Boss[Boss-Kampf]
    
    Combat --> Reward[Reward: 1 aus 3 Upgrades]
    Elite --> Reward
    Shop --> Map
    Event --> Map
    Rest --> Map
    Reward --> Map
    
    Boss --> BossResult{Überlebt?}
    BossResult -->|Ja| NextBiome[Safe Zone → Nächstes Biom]
    BossResult -->|Nein| Death[Tod]
    NextBiome --> Map
    
    Death --> Stats[Run-Stats anzeigen]
    Stats --> MeatCoins[MeatCoins™ erhalten]
    MeatCoins --> Hub[Meta-Hub: Permanente Upgrades]

|--------|----------|
| Voller Run (4 Biome, Sieg) | 25–35 Minuten |
| Einzelnes Biom | 6–9 Minuten |
| Kampf-Raum | 30–60 Sekunden |
| Elite-Raum | 60–90 Sekunden |
| Boss-Kampf | 90–150 Sekunden |
| Shop-Besuch | 20–40 Sekunden |
| Event-Raum | 15–30 Sekunden |
| Ruhe-Raum | 10–15 Sekunden |
| Tod → Nächster Run-Start | < 90 Sekunden |

- Garantierter Shop (Scrap ausgeben)
- 1 aus 3 Upgrades wählen (kostenlos)
- Teilheilung (25% Max-HP)
- Lore-Snippet / Dialog

## 5. Combat System

### Design Intent

Das Kampfsystem priorisiert **Reaktion und Positionierung** über Stat-Checks. Jeder Treffer — gegeben und erhalten — soll bewusst und spürbar sein. Das System ist einfach zu lernen (WASD + Maus), aber durch Waffen-Interaktionen, Status-Effekte und Enemy-Patterns tief.

### Damage Pipeline

\`\`\`mermaid
flowchart LR
    A[Base Damage] --> B["× Weapon Mult"]
    B --> C["× Upgrade Mult"]
    C --> D["- Flat Armor"]
    D --> E{Armor Floor Check}
    E -->|"Normal"| F["Mitigated Damage"]
    E -->|"< 15% Raw"| G["15% Raw Damage"]
    F --> H{Crit Roll}
    G --> H
    H -->|"Crit!"| I["× Crit Multiplier"]
    H -->|"Normal"| J["× 1.0"]
    I --> K["× Status Bonus"]
    J --> K
    K --> L["floor = Final Damage"]
\`\`\`

### Schadensformel

\`\`\`
raw_damage    = base_damage × weapon_mult × upgrade_mult
mitigated     = max(raw_damage - flat_armor, raw_damage × 0.15)
crit_roll     = randf() < crit_chance
crit_mult     = crit_multiplier if crit_roll else 1.0
status_bonus  = Summe aller aktiven Status-Schadensboni (additiv)
final_damage  = floor(mitigated × crit_mult × (1.0 + status_bonus))
\`\`\`

Der \`max(..., raw_damage × 0.15)\` Floor stellt sicher, dass Armor niemals unter 15% des Rohschadens reduziert — verhindert das "Kitzel-Problem" bei Spät-Game-Gegnern.

### Referenzwerte (Biom 1 Baseline)

| Parameter | Startwert | Anmerkung |
|-----------|-----------|-----------|
| \`base_damage\` | 8–12 (pro Charakter) | Pro Hit, Primärwaffe |
| \`weapon_mult\` | 1.0 (Starter) bis 2.5 (Legendary) | Waffen-Rarität skaliert |
| \`upgrade_mult\` | 1.0 Basis + 0.10 pro Damage-Upgrade | 5 Upgrades = 1.5× |
| \`flat_armor\` (Spieler) | 0–15 | Aus Gear/Upgrades |
| \`flat_armor\` (Gegner) | 0–30 | Nur Tanks/Bosse |
| \`crit_chance\` | 5%–25% (pro Charakter) | Hard Cap: 75% |
| \`crit_multiplier\` | 1.5×–2.5× (pro Charakter) | Hard Cap: 4.0× |

### Beispielrechnungen

**Früher Hit (Biom 1, Raum 3):**
- base=10, weapon=1.0, upgrades=1.1, armor=2, kein Crit, kein Status
- raw = 10 × 1.0 × 1.1 = 11 → mitigated = max(11-2, 11×0.15) = 9 → **final = 9**

**Später Crit mit Status (Biom 3, Raum 8):**
- base=10, weapon=1.8, upgrades=1.5, armor=12, Crit(2.2×), Frozen(+0.30)
- raw = 10 × 1.8 × 1.5 = 27 → mitigated = max(27-12, 27×0.15) = 15 → final = floor(15 × 2.2 × 1.3) = **42**

### Status-Effekte

| Status | Typ | Effekt | Dauer | Tick-Rate |
|--------|-----|--------|-------|-----------|
| **Toxic** (Gift) | DoT | 3 DPS | 5s | alle 0.5s |
| **Burning** (Feuer) | DoT | 5 DPS | 3s | alle 0.5s |
| **Frozen** (Eis) | Debuff | +30% eingehender Schaden | 3s | — |
| **Overclocked** (Schock) | Debuff | +25% Schaden auf nächsten Hit, dann weg | 1 Hit | instant |
| **Corrupted** (Glitch) | Debuff | +15%, stackt 3× (max +45%) | 4s/Stack | — |

**DoT-Formel:**
\`\`\`
dot_tick = dot_base_dps × tick_interval × (1.0 + status_bonus_from_other_debuffs)
\`\`\`

### Hit/Hurtbox-System

Collision Layer-Architektur:

| Layer | Name | Genutzt von |
|-------|------|-------------|
| 1 | World | Wände, Hindernisse |
| 2 | Player Body | Spieler CharacterBody2D |
| 3 | Enemy Body | Gegner CharacterBody2D |
| 4 | Player Hurtbox | Spieler Hurtbox (Area2D) |
| 5 | Enemy Hurtbox | Gegner Hurtbox (Area2D) |
| 6 | Player Hitbox | Spieler Waffe/Projektil (Area2D) |
| 7 | Enemy Hitbox | Gegner Waffe/Projektil (Area2D) |

- Player Hitboxes (Layer 6) **masken** Enemy Hurtboxes (Layer 5)
- Enemy Hitboxes (Layer 7) **masken** Player Hurtboxes (Layer 4)

### Invincibility Frames (I-Frames)

| Trigger | I-Frame-Dauer | Visuelles Feedback |
|---------|---------------|-------------------|
| Schaden erhalten | 0.5s | Sprite blinkt weiß (3× Flash) |
| Dash | 0.3s (während Dash) | Sprite wird halbtransparent |
| Auto-Save Proc | 1.0s | Glitch-Shader + "SAVE LOADED" Text |

### Knockback

\`\`\`
knockback_velocity = hit_direction.normalized() × knockback_force
knockback_duration = 0.15s
\`\`\`

Knockback-Werte pro Waffe (siehe Sektion 6).

## 7. Upgrade-System

### Design Intent

Upgrades sind die Seele des Roguelite-Loops. Jeder Run wird durch die Kombination zufälliger Upgrades einzigartig. Das System belohnt sowohl gezielte Synergien als auch glückliche Zufallskombinationen.

### Rarität und Drop-Wahrscheinlichkeiten

| Rarität | Farbe | Stat-Multiplikator | Basis-Gewicht |
|---------|-------|--------------------|---------------|
| **Common** | Grau | 1.0× | 60% |
| **Rare** | Blau | 1.4× | 25% |
| **Epic** | Lila | 1.9× | 10% |
| **Legendary** | Gold | 2.5× | 4% |
| **Cursed** | Rot/Schwarz | 2.8× + Nachteil | 1% |

### Drop-Raten nach Quelle

| Quelle | Drop? | Common | Rare | Epic | Legendary | Cursed |
|--------|-------|--------|------|------|-----------|--------|
| Normaler Gegner | 15% Chance | 75% | 20% | 5% | 0% | 0% |
| Elite-Gegner | 100% | 30% | 45% | 20% | 4% | 1% |
| Mini-Boss | 100% (2 Items) | 0% | 40% | 40% | 15% | 5% |
| Boss | 100% (3 Items) | 0% | 20% | 45% | 25% | 10% |
| Truhe (Normal) | 100% | 50% | 35% | 12% | 3% | 0% |
| Truhe (Verschlossen, 30 Scrap) | 100% | 10% | 40% | 35% | 12% | 3% |

### Pity-System

Nach jedem Nicht-Rare+-Drop aus garantierten Quellen steigt ein \`pity_counter\`:

\`\`\`
adjusted_rare_plus_chance = base_rare_plus_chance + (pity_counter × 0.05)
\`\`\`

| Pity Counter | Bonus | Effektive Rare+ Chance (Truhe) |
|-------------|-------|-------------------------------|
| 0 | +0% | 50% |
| 3 | +15% | 65% |
| 5 | +25% | 75% |
| 8 | +40% | 90% |
| 10 | **Garantiert Rare+** | 100% |

Pity Reset bei jedem Rare+-Drop.

### Synergie-Tags

Jedes Upgrade gehört zu genau einer **Primär-Kategorie** und optional einer **Sekundär-Kategorie**:

| Tag | Thema | Farbe |
|-----|-------|-------|
| **FLESH** | HP, Regen, Lifesteal, Thorns | Rot |
| **CHROME** | Armor, Schilde, Schadens-Reduktion | Silber |
| **NERVE** | Speed, Dodge, Attack Speed, Crit | Gelb |
| **VOLT** | Elementar-Schaden, Status-Effekte, AoE | Cyan |
| **GLITCH** | Zufall, Curses, High-Risk/Reward | Magenta |

### Stacking-Regeln

**Additives Stacking** (gleichnamige Upgrades):
- Selbes Upgrade 2× = doppelter Bonus. +10% Damage + +10% Damage = +20%
- Max 5 Stacks pro einzelnes Upgrade

**Multiplikatives Stacking** (Cross-Category):
- Verschiedene Kategorien multiplizieren sich
- FLESH Lifesteal (5%) × NERVE Attack Speed (+30%) = mehr Heilung pro Sekunde

**Diminishing Returns** (Soft Caps):

| Stat | Soft Cap | Effekt über Cap |
|------|----------|-----------------|
| Crit Chance | 50% | Jeder Punkt über 50% gibt nur 0.5% statt 1% |
| Attack Speed | +80% | Jeder Punkt über 80% gibt nur 0.33% |
| Move Speed | +60% | Jeder Punkt über 60% gibt nur 0.5% |
| Damage% | +150% | Jeder Punkt über 150% gibt nur 0.5% |
| Armor | 40 | Jeder Punkt über 40 gibt nur 0.5 |

### Synergie-Trigger

3+ Upgrades desselben Tags = **Set-Bonus**:

| Tag | 3er-Synergie | 5er-Synergie |
|-----|-------------|-------------|
| **FLESH** | Kills heilen 2 HP | Kill: 8% Chance auf Health-Orb |
| **CHROME** | +10 Flat Armor | Tödlicher Schaden: Überlebe mit 1 HP (1×/Biom) |
| **NERVE** | +15% Move Speed | Jeder 5. Hit ist automatisch ein Crit |
| **VOLT** | Status-Effekte dauern 50% länger | 2 Status auf selben Gegner → "Meltdown" (AoE-Burst, 40 Damage) |
| **GLITCH** | +1 Auswahl bei Upgrade-Selection | 20% Chance auf "Glitch Event" pro Raum (random positiv/negativ) |

### Passive Upgrades — Katalog

#### FLESH-Kategorie

| Upgrade | Effekt | Flavor |
|---------|--------|--------|
| **Biohazard Sucker** | Heilt 3 HP wenn du über tote Gegner läufst (Radius: 40px) | *"Recycling ist wichtig."* |

| **Überlastungsschutz** | Bei 3+ Gegnern im Umkreis (100px): +25% AoE-Damage | *"Sicherung raus, Schaden rein."* |

#### GLITCH-Kategorie

| Upgrade | Effekt | Flavor |
|---------|--------|--------|
| **404 Not Found** | Jeder 4. Hit: 0 Damage ODER 4× Damage (50/50) | *"Verhalten wie dokumentiert."* |

| **Random Access Memory** | Bei Upgrade-Auswahl: +1 zufälliges Upgrade als Bonus | *"malloc succeeded. Somehow."* |

### Cursed Upgrades (Risk/Reward)

| Upgrade | Pro | Contra | Tag |
|---------|-----|--------|-----|
| **Overclocked Legs** | Doppelter Dash | Jeder Dash kostet 1 HP | NERVE |
| **Glass Cannon Chip** | +100% Schaden | Max HP halbiert | GLITCH |
| **YOLO Protocol** | 3× Schaden auf ersten Hit/Gegner | Kann nicht heilen | GLITCH |
| **Schulden-Inkasso** | +100% Scrap-Drops | Shops kosten 50% mehr | CHROME |
| **Zitternde Optik** | +40% Crit Chance | Screen Shake bei jedem Hit | NERVE |
| **Übertaktetes Herz** | +3 HP Regen/s | Max HP -30% | FLESH |

### Power Ceiling Management

1. **Stack-Caps** (max 5 pro Upgrade)
2. **Soft Caps** mit Diminishing Returns auf Key-Stats
3. **Upgrade-Pool-Dilution** — Pool wächst, Synergien werden schwerer zu vervollständigen
4. **Opportunity Cost** — FLESH wählen = NERVE nicht wählen
5. **Boss-Skalierung** — Finaler Boss skaliert mit Player Power: \`boss_hp *= 1.0 + (total_upgrades × 0.02)\`

## 8. Characters

### Design Intent

4 Charaktere bei Launch, jeder mit eigenem Playstyle, Startwaffe und Passive. Kein Charakter ist "besser" — jeder belohnt einen anderen Spielstil und synergiert mit anderen Upgrade-Tags.

### Klaus — Der Bürokrat (Starter)

> *"Ex-Sachbearbeiter bei MeatCorp™. Wurde 'freiwillig' zum Kampf-Upgrade-Tester befördert."*

| Stat | Wert |
|------|------|
| HP | 100 |
| Move Speed | 300 px/s |
| Base Damage | 10 |
| Crit Chance | 10% |
| Crit Multiplier | 1.75× |
| Armor | 5 |
| Dodge Chance | 5% |

**Startwaffe:** Aktenkoffer des Schmerzes

## 9. Enemies

### Design Intent

#### Pro-Raum-Skalierung (innerhalb eines Bioms)

\`\`\`
room_scale = 1.0 + (room_index × 0.08)
\`\`\`

| Biom-Raum # | room_scale | Effekt auf 50 HP Gegner |

| 1 | 1.00 | 50 HP |
| 3 | 1.16 | 58 HP |

spawn_count  = floor(base_spawn × (1.0 + room_index × 0.06) × biome_spawn_mult)

## 11. Dungeon Generation

### Design Intent

Die prozedural generierte Map bietet dem Spieler **informierte Entscheidungen** statt blindem Zufall. Branching Paths zeigen Raum-Typen im Voraus, sodass der Spieler zwischen Risk/Reward-Pfaden wählen kann.

### Biom-Struktur

Jedes Biom enthält **10 Räume** (8 in Biom 1 für schnelleres Onboarding).

| Raum-Typ | Symbol | Anzahl/Biom | Platzierungsregeln |
|----------|--------|-------------|-------------------|
| **Kampf** | ⚔ | 5 | Füllt restliche Slots |
| **Elite** | ★ | 1 | Nur Räume 5–8 (nie in ersten 4) |
| **Shop** | 💰 | 1 | Räume 3–7 (nie angrenzend an anderen Shop) |
| **Event** | ❓ | 1 | Räume 2–8 |
| **Ruhe** | ❤ | 1 | Räume 4–7 |
| **Boss** | 💀 | 1 | Immer letzter Raum |

### Garantierte Platzierungen

1. Raum 1 ist **immer Kampf** (Einstieg)
2. Letzter Raum ist **immer Boss**
3. **Shop** erscheint immer vor dem Boss (Räume 3–7)
4. **Ruhe** erscheint im mittleren Drittel
5. Keine zwei Nicht-Kampf-Räume direkt nebeneinander
6. Elite-Raum nie an gleicher Position in zwei aufeinanderfolgenden Biomen

### Map-Layout (Branching Paths)

Der Spieler wählt zwischen 2–3 verzweigten Pfaden (Slay-the-Spire-Stil). Jeder Pfad zeigt den Raum-Typ-Icon, sodass Planung möglich ist.

\`\`\`
[⚔] → [⚔] → [💰] ↘
                    → [★] → [⚔] → [💀]
[⚔] → [❓] → [❤] ↗
\`\`\`

### Generierungs-Algorithmus (Pseudocode)

\`\`\`
func generate_biome(biome_size: int) -> Array[RoomType]:
    var rooms = []
    rooms.resize(biome_size)
    rooms.fill(RoomType.COMBAT)
    rooms[-1] = RoomType.BOSS
    
    place_guaranteed(rooms, RoomType.SHOP, range(2, biome_size - 3))
    place_guaranteed(rooms, RoomType.REST, range(3, biome_size - 3))
    place_guaranteed(rooms, RoomType.ELITE, range(4, biome_size - 2))
    place_guaranteed(rooms, RoomType.EVENT, range(1, biome_size - 2))
    
    validate_no_adjacent_specials(rooms)
    return rooms

func place_guaranteed(rooms: Array, type: RoomType, valid_range: Array) -> void:
    var candidates = valid_range.filter(func(i): return rooms[i] == RoomType.COMBAT)
    rooms[candidates.pick_random()] = type
\`\`\`

### Biome

#### Biom 1: Büro-Komplex (8 Räume)

- **Ästhetik:** Cubicles, Kopierer, Kaffeeküche, Motivationsposter
- **Umgebungsgefahren:** Kopierer (periodischer Blitz, blendet 1s), Kaffee-Pfützen (Slow-Zone)
- **Einzigartige Gegner:** Cubicle Drone, Spam Bot, Patch Tuesday
- **Boss:** CEO-Mech

## 12. Meta-Progression

### Design Intent

Der Meta-Loop gibt dem Spieler das Gefühl, dass jeder Tod Fortschritt ist. Frühe Unlocks kommen schnell (alle 2–3 Runs), späte erfordern Investment. Das System soll ~80–120 Runs halten, bevor alles freigeschaltet ist.

### Meta-Währung: MeatCoins™

Verdient am Ende jedes Runs. Bleiben nach dem Tod.

**Earning-Formel:**
\`\`\`
meatcoins = floor(
    (rooms_cleared × 2)
  + (enemies_killed × 0.3)
  + (boss_kills × 15)
  + (biomes_completed × 25)
  + time_bonus
  + streak_bonus
)
\`\`\`

| Komponente | Typischer Wert | Anmerkung |
|-----------|---------------|-----------|
| rooms_cleared × 2 | 20–80 | 10–40 Räume |
| enemies_killed × 0.3 | 30–90 | 100–300 Gegner |
| boss_kills × 15 | 0–60 | 0–4 Bosse |
| biomes_completed × 25 | 0–100 | 0–4 Biome |
| time_bonus | 0–30 | 30 wenn unter 30min, skaliert runter |
| streak_bonus | 0–20 | +5 pro aufeinanderfolgendem Run mit Boss-Kill |

### Erwartete MeatCoins pro Run

| Szenario | MeatCoins |
|----------|-----------|
| Gescheiterter Run (Biom 1) | 15–40 |
| Mittlerer Run (Tod in Biom 2) | 50–100 |
| Guter Run (Tod in Biom 3) | 120–180 |

## 15. Audio Design

### Design Intent

Audio verkauft das Game-Feel. Jeder Hit muss sich *gut anfühlen*, jedes Biom muss eine eigene akustische Identität haben, und das adaptive System soll Spannung dynamisch steuern.

### Musik-Stil pro Biom

| Biom | Stil | BPM | Kern-Instrumente | Stimmung |
|------|------|-----|-------------------|----------|
| **Büro-Komplex** | Lo-fi Synthwave × Muzak | 90–110 | Verstimmtes Rhodes, glatter Bass-Synth, gedämpfte Drum Machine, Saxophon | Passiv-aggressive Ruhe. Wie Warteschleife bei HR während das Gebäude brennt. |
| **Server-Katakomben** | Dark Ambient / Industrial | 70–85 (ambient), 120–140 (combat) | Sub-Bass-Drones, Granular-Synthesis, Bitcrushed Percussion | Klaustrophobischer Dread. Die Maschine lebt. |
| **Penthouse-Etage** | Vaporwave / Future-Funk | 100–120 | Slap Bass, Gated Reverb Snare, Vocal Samples | Dekadenter Exzess. Alles zu glatt, zu teuer, zu hohl. |
| **Recycling-Anlage** | Breakcore-Industrial | 140–170 | Distorted Breaks, metallische Percussion, Kettensägen-Synths | Viszerale Panik. Fleisch trifft Maschine. |

### Adaptives Audio-System

\`\`\`
COMBAT INTENSITY LAYERS:

Layer 0 — EXPLORATION (keine Gegner)
├── Biom-Ambient-Pad (immer aktiv)
├── Melodisches Element (sanft, spärlich)
└── Foley (Schritte, Umgebung)

Layer 1 — TENSION (Gegner sichtbar, kein Kampf)
├── Ambient-Pad (Filter öffnet leicht)
├── Melodie faded out
├── Percussion tritt ein (spärlich, antizipatorisch)
└── Basslinie faded ein

Layer 2 — COMBAT (aktiver Kampf, HP > 50%)
├── Ambient-Pad (Filter voll offen)
├── Volles Drum-Pattern
├── Basslinie (aktiv, treibend)
├── Lead-Synth-Melodie
└── Combat SFX ducken Musik -3dB (Sidechain)

Layer 3 — INTENSITY (HP < 50% ODER Elite/Boss)
├── Alle Layer-2-Elemente
├── Zusätzliche Percussion (Double-Time Hats)
├── Distortion auf Master steigt
├── Tempo Micro-Increase (+5 BPM)
└── Herzschlag-Sub-Bass

Layer 4 — CRITICAL (HP < 20%)
├── Alle Layer-3-Elemente
├── High-Pass-Filter-Sweeps
├── Stinger bei Player-Damage
├── Herzschlag wird dominant
└── Reverb-Tail verkürzt sich (klaustrophobisch)

BOSS-FIGHTS:
├── Einzigartiger Intro-Stinger (2–4 Takte)
├── Dedizierter Boss-Track (nicht aus Biom-Layern)
├── Phasen-Übergänge = Musik-Transitions
└── Victory-Fanfare → Fade zu Exploration
\`\`\`

### SFX-Kategorien

| Kategorie | Beispiele | Anmerkung |
|-----------|----------|-----------|
| **Player Movement** | Schritte (pro Surface), Dash-Whoosh, Landen | 3–5 Varianten/Sound, Pitch-Randomization ±5% |
| **Player Combat** | Swing (pro Waffe), Hit-Confirm, Miss, Crit (punchiger) | Hit-Confirm = wichtigster "Game Feel"-Sound |
| **Enemy Audio** | Alert/Aggro, Wind-Up, Attack, Hit-Reaction, Tod | Corporate: Keyboard-Clacking, Tacker-Schüsse |
| **UI/Menu** | Hover, Press, Back, Error, Tab-Switch | Subtil, snappy, Cyberpunk-Flavor |
| **Economy** | Scrap Pickup, Scrap Spend, Item Acquire, Relic Acquire | Aufsteigende Töne beim Erwerben |
| **Status Effects** | Buff Applied, Debuff Applied, Curse Applied, Heal | Buffs = clean/bright, Debuffs = distorted/dark |
| **Environment** | Türen, Aufzug, Automat, Drucker, Server-Hum, Neon-Buzz | 5–8 Ambient-Loops + Spot-FX pro Biom |
| **Boss-Specific** | Intro, Phasen-Transition, Unique Attacks, Tod-Sequenz | Jeder Boss = Spektakel |

### Technische Audio-Umsetzung

- **Audio Bus Struktur:** Master → Music, SFX, Ambience, UI (jeweils unabhängige Lautstärke)
- **Sidechain:** SFX-Bus duckt Music-Bus während Kampf
- **AudioStreamRandomizer** für Variation
- **Stem-basierte Musik:** 4–6 Stems pro Track für adaptives Layering
- **Audio Player Pool:** 8–12 gleichzeitige SFX, 2–3 Music-Layers, 2–4 Ambience

### State Machine Pattern (Node-Based)

\`\`\`gdscript
# state.gd — Basis-Klasse für alle States
class_name State extends Node

signal finished(next_state_path: String, data: Dictionary)

func handle_input(_event: InputEvent) -> void:
    pass

func update(_delta: float) -> void:
    pass

func physics_update(_delta: float) -> void:
    pass

func enter(_previous_state_path: String, _data := {}) -> void:
    pass

func exit() -> void:
    pass
\`\`\`

\`\`\`gdscript
# state_machine.gd — Controller
class_name StateMachine extends Node

@export var initial_state: State = null

@onready var state: State = initial_state if initial_state else get_child(0)

func _ready() -> void:
    for state_node: State in find_children("*", "State"):
        state_node.finished.connect(_transition_to)
    await owner.ready
    state.enter("")

func _unhandled_input(event: InputEvent) -> void:
    state.handle_input(event)

func _process(delta: float) -> void:
    state.update(delta)

func _physics_process(delta: float) -> void:
    state.physics_update(delta)

func _transition_to(target_state_path: String, data: Dictionary = {}) -> void:
    if not has_node(target_state_path):
        printerr(owner.name + ": Invalid state " + target_state_path)
        return
    var previous := state.name
    state.exit()
    state = get_node(target_state_path)
    state.enter(previous, data)
\`\`\`

### Event Bus (Autoload Singleton)

\`\`\`gdscript
# event_bus.gd — Autoload: "Events"
extends Node

# Player Events
signal player_health_changed(old_value: float, new_value: float)
signal player_died
signal player_dashed

# Combat Events
signal enemy_killed(enemy_data: EnemyData, position: Vector2)
signal damage_dealt(amount: float, position: Vector2, is_crit: bool)

# Room / Dungeon Events
signal room_cleared
signal room_entered(room_type: String)

# Game Flow
signal run_started
signal run_ended(won: bool)
signal pause_toggled(is_paused: bool)

# Economy
signal scrap_gained(amount: int)
signal upgrade_acquired(upgrade: UpgradeData)

# Meta
signal meatcoins_earned(amount: int)
\`\`\`

### Autoload-Strategie

| Autoload | Name | Zweck | Begründung |
|----------|------|-------|------------|
| \`event_bus.gd\` | \`Events\` | Globaler Signal-Bus | Entkoppelte Kommunikation über Scenes hinweg |
| \`game_manager.gd\` | \`Game\` | Run-State, Difficulty, Floor | Muss Scene-Wechsel überleben |
| \`save_manager.gd\` | \`Save\` | Speichern/Laden | Zustandsloser Utility, braucht globalen Zugang |
| \`player_data.gd\` | \`PlayerData\` | Persistente Stats, Inventar, Upgrades | Muss Raum-Transitionen überleben |

**Was NICHT Autoload sein sollte:** AudioManager (lokal pro Scene), EnemyManager (Child des Raums), UIManager (UI Canvas Layer in Main Scene), WeaponManager (Komponente unter Player).

### Input-Handling

\`\`\`gdscript
# Bewegung (Polling in _physics_process)
var input_dir := Input.get_vector("move_left", "move_right", "move_up", "move_down")
velocity = input_dir * speed
move_and_slide()

# Aim (Maus)
var aim_direction := get_global_mouse_position() - global_position
weapon_pivot.rotation = aim_direction.angle()

# Diskrete Aktionen (Event-basiert in _unhandled_input)
if event.is_action_pressed("attack"):
    _attack()
elif event.is_action_pressed("dash"):
    _dash()
\`\`\`

### Performance-Patterns

- **Object Pooling** für Projektile (Pool-Größe: 50, wächst bei Bedarf)
- **Area-basierte Enemy-Aktivierung** — nur aktive Gegner in \`_physics_process\`
- **Typed Arrays** (\`Array[Enemy]\`) für schnellere Iteration
- **\`PackedVector2Array\`** für Pfad-Daten
- **Groups** für Batch-Operationen: \`get_tree().call_group("enemies", "deactivate")\`
- **\`call_deferred()\`** für schwere Operationen (Wave-Spawning)

### Godot 4.6 Features im Einsatz

| Feature | Version | Einsatz im Projekt |
|---------|---------|-------------------|
| Typed Dictionaries | 4.4+ | \`Dictionary[String, int]\` für Stat-Tabellen |
| Abstract Classes | 4.5+ | \`@abstract class BaseEnemy\` mit Required Overrides |
| \`TileMapLayer\` | 4.0+ | Separate Floor/Wall/Decoration Layers |
| \`AStarGrid2D\` | 4.0+ | Grid-Pathfinding für Dungeon-Generierung |
| Unique Nodes (\`%\`) | 4.0+ | \`@onready var sprite := %Sprite\` — sichere Referenzen |
| Pattern Guards in \`match\` | 4.0+ | Saubere State-Transitions |
| Static Variables | 4.0+ | \`static var instance_count\` auf Enemy-Klassen |

## 18. Risiken & Mitigation

| # | Risiko | Wahrscheinlichkeit | Impact | Mitigation |
|---|--------|-------------------|--------|------------|
| 1 | **Scope Creep** — "Nur noch ein Gegner-Typ / Item / Event" | Sehr hoch | Hoch | Iron-clad MVP-Feature-Liste *vor* Entwicklung. "Parking Lot"-Dokument für Nicht-MVP-Ideen. Jedes neue Feature muss einen Game Pillar bedienen. Vierteljährliche Scope-Reviews. |
| 2 | **Balancing-Albtraum** — Kombinatorische Explosion aus Items, Upgrades, Synergien | Sehr hoch | Hoch | Telemetrie ab Tag 1 (Run-Stats, Item-Pick-Rates, Win-Rates). Automatisiertes Playtesting (Bot für Tausende simulierte Kämpfe). Balance in Daten-Wellen, nicht nach Bauchgefühl. Einige broken Combos sind *fun* — nur fixen wenn trivial-easy oder impossible. |
| 3 | **Content Fatigue** — Spieler sehen alles in 5–10 Runs | Hoch | Kritisch | Modulare, kombinierbare Content-Pieces (Gegner mit modularen Behaviors, Events mit variablen Outcomes). Ascension-System das vorhandenen Content remixt. Post-Launch Content-Drops. Meta-Progression über 30+ Runs. |
| 4 | **Prozedurale Generierung wirkt samey** | Hoch | Hoch | Hand-gefertigte Room-Templates, Generator kombiniert sie. Constraint-basierte Generierung (garantierte Encounter-Patterns). "Scenario Seeds" — vorgefertigte 2–3-Raum-Sequenzen. Visuelle Variation auch innerhalb desselben Bioms. |
| 5 | **Technical Debt** — Prototyp-Code wird Production-Code | Hoch | Mittel-Hoch | Architektur-Patterns früh etablieren: Resources für Daten, flache Scene Trees, Signals statt direkte Referenzen. 20% jedes Milestones für Refactoring. Integration-Tests für Kern-Systeme. |
| 6 | **Solo/Small Team Burnout** | Hoch | Kritisch | Art auf nachhaltige Pixel-Auflösung (32×32) scopen. Prozedurale VFX (GPUParticles2D) statt handanimiert. Audio outsourcen wenn kein dedizierter Audio-Mensch. Batch-Content-Creation. Pausen einhalten. MVP shippen, dann iterieren. |
| 7 | **Save System Corruption** | Mittel | Kritisch | Save-System-Architektur *zuerst* designen. Godot Resource-Serialization oder striktes JSON-Schema. Save-Versionierung und Migration ab Tag 1. Save/Load bei jedem Milestone testen. "Known-Good" Save-Suite für Regressions-Tests. |
| 8 | **First-Run-Problem** — Neue Spieler prallen nach 1–2 Runs ab | Mittel | Hoch | Erster Run = kuratierter Tutorial-Run (fester Seed, gescriptete Events). Meta-Unlocks auf Death-Screen zeigen. Frühe Unlocks kommen schnell (ersten 5 Runs). Klare Botschaft: "Dieser Tod war Fortschritt." |
| 9 | **Engine-Probleme** — Godot 4.6 ist relativ neu | Mittel | Mittel | Godot-Version pro Milestone pinnen. Nicht mid-Milestone upgraden. Core-Funktionalität nicht von GDExtension-Plugins abhängig machen. Engine-Bug-Log und Workaround-File führen. |
| 10 | **Community-Erwartungen vs. Realität** (Early Access) | Mittel | Mittel | Erwartungen auf EA-Store-Page setzen: explizite Content-Roadmap, Update-Kadenz, Known Issues. Öffentliche Roadmap (Trello). Verzögerungen *vor* Deadlines kommunizieren. Discord-Community für Feedback-Loops. |

### 19.3 Behobene Bugs (Implementierung)

| # | Bug | Ursache | Fix |
|---|-----|---------|-----|
| 1 | **Player bewegt sich nicht (WASD)** | \`StateMachine.find_children("*", "State")\` fand Script-Klassen nicht zuverlässig → \`character\` wurde nie auf State-Nodes gesetzt → alle States brachen bei \`if not _player: return\` ab | \`get_children()\` + \`is State\` Check statt \`find_children\`. \`await owner.ready\` durch \`call_deferred("_initialize_state")\` ersetzt. \`_initialized\`-Flag verhindert vorzeitige Updates. |
| 2 | **Gegner sterben nicht** | \`health_component.died.connect(_on_died)\` in \`enemy_base.gd\` war innerhalb von \`if health_component and enemy_data:\`. Da \`enemy_data\` null war (kein .tres zugewiesen), wurde das Signal nie verbunden. | \`died\`-Connection aus dem \`enemy_data\`-Check herausgezogen. |
| 3 | **Death-Screen Buttons reagieren nicht** | \`GameManager.set_state(DEAD)\` pausierte den SceneTree. Death-Screen hatte kein \`process_mode = ALWAYS\` → konnte keine Inputs empfangen. | DEAD-State pausiert Tree nicht mehr. \`_show_death_screen()\` setzt \`paused = false\` vor Scene-Wechsel. |
| 4 | **Hurtbox-Typfehler auf Player** | \`player.tscn\` hatte kein \`hurtbox.gd\`-Script auf dem Hurtbox-Node. \`@onready var hurtbox: Hurtbox\` bekam ein nacktes \`Area2D\` statt einem \`Hurtbox\`-Objekt. | Script \`hurtbox.gd\` dem Node in der Scene zugewiesen, \`is_player = true\` gesetzt. |
| 5 | **Signal "finished" unused Warning** | \`state.gd\` deklariert \`finished\`-Signal, emittiert es aber nicht in der Basisklasse (nur in Subklassen). | \`@warning_ignore("unused_signal")\` hinzugefügt. |
| 6 | **HUD-Nodes nicht gefunden** | \`%HPBar\`-Syntax (Unique Names) funktionierte nicht in hand-geschriebenen .tscn-Dateien. | \`%\`-Referenzen zu \`$\`-Pfaden geändert (direkte Kind-Nodes). |
| 7 | **Signal already connected** | \`room_cleared.connect(_on_room_cleared, CONNECT_ONE_SHOT)\` wurde bei jedem Raum aufgerufen, ohne zu prüfen ob bereits verbunden. | \`is_connected()\`-Check vor \`connect()\` hinzugefügt. |
| 8 | **Integer Division Warning** | \`int(time_s) / 60\` in Death-Screen erzeugte Godot-Warnung. | \`@warning_ignore("integer_division")\` + expliziter \`int\`-Typ. |
| 9 | **BOSS-Räume sofort als cleared markiert** | \`room_manager.setup_room()\` markierte alle Nicht-COMBAT-Räume als cleared, inklusive BOSS. | BOSS-Räume werden jetzt wie COMBAT behandelt (brauchen feindliche Clearance). |

## 20. Architektur-Erkenntnisse

### 20.1 Was gut funktioniert

- **Component-System**: HealthComponent + Hitbox + Hurtbox als wiederverwendbare Nodes machen das Hinzufügen neuer Gegner/Charaktere trivial.
- **State Machine Pattern**: Der generische StateMachine-Controller mit State-Basis-Klasse ermöglicht es, neue Behaviors als einfache Scripts hinzuzufügen.
- **Event Bus**: Entkoppelte Kommunikation über Signals vermeidet zirkuläre Abhängigkeiten zwischen Systemen.
- **Data-Driven Design**: WeaponData, EnemyData, UpgradeData als Resources erlauben Balance-Änderungen ohne Code-Anpassungen.

### 20.2 Bekannte technische Schulden

1. **Hand-geschriebene .tscn-Dateien**: Viele Scenes wurden manuell als Text geschrieben statt über den Godot-Editor. Das kann zu UID-Konflikten, fehlenden Properties und schwer debugbaren Fehlern führen. → **Empfehlung**: Scenes im Godot-Editor öffnen und re-speichern.

2. **Fehlende EnemyData-Resources**: Gegner-Scenes referenzieren \`@export var enemy_data: EnemyData\`, aber es existieren keine \`.tres\`-Dateien. Alle Werte kommen aus Fallbacks in den State-Scripts. → **Empfehlung**: Pro Gegner-Typ eine \`.tres\`-Datei erstellen.

3. **Upgrade-Effekte nur als Stat-Modifikation**: Das UpgradeManager-System kann nur numerische Stats ändern. Für Spezialeffekte (z.B. "Biohazard Sucker" heilt bei toten Gegnern) fehlt ein Effect-Script-System. → **Empfehlung**: \`effect_script: Script\`-Feld in UpgradeData nutzen.

4. **Keine Fehlerbehandlung bei Scene-Wechseln**: \`change_scene_to_file()\` kann fehlschlagen wenn der Pfad falsch ist. Kein Fallback-Verhalten implementiert. → **Empfehlung**: Wrapper-Funktion mit Fehlerprüfung.

### 20.3 Empfohlene nächste Schritte (Priorität)

1. **EnemyData .tres-Dateien erstellen** — Gibt allen Gegnern korrekte Werte statt Fallbacks
2. **Boss-Scene (CEO-Mech)** — Komplettiert den Biom-1-Loop
3. **Shop-Room implementieren** — Kernmechanik des Run-Loops
4. **Difficulty Scaling aktivieren** — room_scale + biome_mult Formeln anwenden
5. **Zweite Waffe (Aktenkoffer)** — Validiert das Waffenwechsel-System
6. **Upgrade-Spezialeffekte** — Macht das Upgrade-System spielrelevant
7. **Sprites/Pixel Art** — Ersetzt ColorRect-Platzhalter
