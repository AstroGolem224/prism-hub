    const raw = `# 🎮 MEAT MACHINE CYCLE — Sprint Plan

> **Version:** v3.1 — 23.02.2026  
> **Ziel:** Spielbare Demo auf Steam "Coming Soon" Seite  
> **Zeitrahmen:** ~4 Wochen (4 Sprints à ~1 Woche)  
> **Team:** Druid (Abends/WE) + PRISM (autonom tagsüber) + ADy (Creative Direction, UI/UX)  
> **Start:** KW 9 (Mo 23.02.2026)

---

## ⏰ Arbeitsmodell

| | Druid | PRISM |
|--|-------|-------|
| **Mo-Fr 07-17h** | Hauptjob (Telegram erreichbar) | Autonom arbeiten |
| **Mo-Fr 17-23h** | MMC: Review, Test, Creative, Godot Editor | Support, Live-Pairing |
| **Wochenende** | MMC: Flexibel | Support |

**Tagesrhythmus:**
- **Morgens (06:00):** PRISM schickt Telegram-Briefing (was gestern lief, was heute ansteht)
- **Tagsüber:** PRISM arbeitet autonom, Telegram für Quick-Decisions
- **Abends (17:00+):** Druid reviewed, testet, macht Editor-Tasks
- **Abends (Ende):** Kurze Sync — was ist offen, was kommt morgen

**Regel:** Alles was keinen Godot Editor oder Creative Decision braucht → PRISM macht es tagsüber.

---

## 📊 Aktueller Stand

**MVP-Fortschritt: ~65%** — Kernloop funktioniert, aber kein Boss, keine Assets, kein Sound.

| Was steht | Was fehlt |
|-----------|-----------|
| ✅ Player Controller (6 States) | ❌ Boss (CEO-Mech) |
| ✅ 3 Gegnertypen | ❌ 2 weitere Gegnertypen |
| ✅ Damage Pipeline (Armor, Crit, Caps) | ❌ Status-Effekte |
| ✅ Dungeon Generator (8 Räume) | ❌ Shop/Event-Räume |
| ✅ Upgrade-System (5 Upgrades) | ❌ Upgrade-Spezialeffekte |
| ✅ Toaster Arm Waffe | ❌ Zweite Waffe (Aktenkoffer) |
| ✅ MetaProgression + MeatCoins | ❌ Victory Screen |
| ✅ HUD, Menus, Death Screen | ❌ Character Select |
| ✅ Event Bus (17 Signals) | ❌ Difficulty Scaling |
| ✅ 3 Floor-Tiles (Krita + Gemini) | ❌ Sprites, Animationen, Sound |

---

## 🏃 Sprint 1 — "Fundament fixen" (KW 9: 23.–27.02.)

> **Ziel:** Bugs raus, Daten rein, solide Basis für alles Weitere.

### Montag–Freitag tagsüber (PRISM autonom)

| # | Task | Aufwand | Tag |
|---|------|---------|-----|
| 1.1 | MetaProgression Doppel-Coins Bug fixen | 30min | Mo |
| 1.2 | Room-Advance nach Upgrade fixen | 30min | Mo |
| 1.3 | EnemyData .tres-Dateien erstellen (3 Gegner) | 1h | Mo |
| 1.5 | Difficulty Scaling aktivieren | 1h | Di |
| 1.7 | Victory Screen erstellen | 1h | Di |
| 1.8 | REST-Räume: Heal + Upgrade-Auswahl | 1.5h | Mi |

### Abends / Wochenende (Druid)

| # | Task | Aufwand | Wann |
|---|------|---------|------|
| 1.4 | Toaster Arm .tres UID-Fix (Godot Editor) | 30min | Mo Abend |
| 1.6 | Scenes in Godot Editor re-speichern | 30min | Mo Abend |
| — | Review + Test aller PRISM-Fixes | 1h | Mi/Do Abend |

**Sprint 1 Ergebnis:** Stabiler, bug-freier Core-Loop mit korrekten Daten.

---

## 🏃 Sprint 2 — "Content & Gameplay" (KW 10: 02.–06.03.)

> **Ziel:** Kompletter Biom-1 Loop mit Boss, Shop, Events.

### Tagsüber (PRISM autonom)

| # | Task | Aufwand | Tag |
|---|------|---------|-----|
| 2.2 | Shop-Room UI + Logik | 3h | Mo |
| 2.3 | Event-Room (3 Random Events) | 2h | Di |
| 2.4 | Zweite Waffe: Aktenkoffer (.tres + Scene) | 2h | Di |
| 2.5 | Firewall-Gegner (Tank) | 2h | Mi |
| 2.6 | Clipboard Karen (Support) | 2h | Mi |
| 2.7 | Upgrade-Spezialeffekte | 3h | Do |
| 2.8 | Character Select Screen | 2h | Fr |

### ADy (Creative Direction)

| # | Task | Aufwand |
|---|------|---------|
| 2.A1 | Character Select Screen — UI-Konzeption & Layout | 2h |
| 2.A2 | Shop-Room — UI-Konzeption & Visual Design | 2h |

### Abends (Druid + PRISM Pairing)

| # | Task | Aufwand | Wann |
|---|------|---------|------|
| 2.0 | Ludo AI: Boss & Ability Prototyping | 1h | Mo Abend |
| 2.1 | Boss: CEO-Mech (Creative Direction + Review) | 2h | Di+Mi Abend |
| — | Playtesting Shop, Events, neue Gegner | 2h | Do+Fr Abend |

### Wochenende

| # | Task | Aufwand |
|---|------|---------|
| 2.1 | Boss: CEO-Mech Feinschliff + Balancing | 2h |
| — | Gesamttest: Biom-1 Run komplett | 1h |

**Sprint 2 Ergebnis:** Vollständiger Biom-1 Run: 8 Räume → Shop/Events → Boss → Victory.

---

## 🏃 Sprint 3 — "Look & Feel" (KW 11: 09.–13.03.)

> **Ziel:** Weg von Platzhaltern, echte Assets, Sound.

### Tagsüber (PRISM autonom)

| # | Task | Aufwand | Tag |
|---|------|---------|-----|
| 3.2 | Player-Modell (Klaus) in Blender MCP | 3h | Mo |
