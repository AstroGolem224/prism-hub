    const raw = `# 🎮 MEAT MACHINE CYCLE — Sprint Plan

> **Version:** v4.0 — 03.03.2026  
> **Pivot:** Arena-Modus (Vampire Survivors Style) statt Room-basiertes Roguelike  
> **Ziel:** Spielbare Demo auf Steam "Coming Soon" Seite  
> **Zeitrahmen:** ~3 Wochen (3 Sprints à ~1 Woche)  
> **Team:** Druid (Abends/WE) + PRISM (autonom tagsüber) + ADy (Creative Direction)  
> **Start:** KW 10 (Di 03.03.2026)

---

## ⏰ Arbeitsmodell

(unverändert — Druid 17-23h + WE, PRISM autonom tagsüber, Morgen-Briefing + Abend-Sync)

---

## 📊 Aktueller Stand nach Pivot

**Arena-Fortschritt: ~40%** — Grundloop läuft, aber noch kein VS-Feel.

| Was steht ✅ | Was fehlt ❌ |
|-------------|------------|
| Arena-Modus (infinite floor, edge spawning) | XP-Gems / Pickup-System |
| 3 Gegnertypen (Drone, Spam Bot, Patch Tuesday) | Mehr Gegnertypen (Firewall, Karen) |
| CEO-Mech Boss (4 Phasen) | Wave-Ankündigungen |
| Klaus Player-Sprite (6×6 directional) | Auto-Aim / Weapon-Overhaul |
| Upgrade alle 10 Kills | Passive Items / Pickup-Upgrades |
| Hit-Flash, Damage Pipeline | Magnet (XP anziehen) |
| 1920×1080 Auflösung | Damage Numbers |
| MetaProgression + MeatCoins | Victory Screen |
| Bug-Fixes (Coins, Room-Advance, detection) | Character Select |
| | Sound + Musik |
| | Sprites für alle Characters |

### Was entfällt (Room-basiert → raus)
- ~~Dungeon Generator~~ (bleibt im Code als Fallback)
- ~~Shop-Rooms~~ → werden zu Chest-Pickups im Arena
- ~~Event-Rooms~~ → werden zu Random-Events (Zeitbasiert)
- ~~REST-Räume~~ → Health-Pickups stattdessen
- ~~Room-Advance Logik~~ → Wave-System

---

## 🏃 Sprint 2 (reboot) — "VS Core Loop" (KW 10: 03.–07.03.)

> **Ziel:** Sich wie ein Vampire Survivors Klon anfühlen.

### Tagsüber (PRISM autonom)

| # | Task | Aufwand | Prio |
|---|------|---------|------|
| 2.1 | **XP-Gem System** — Gegner droppen Gems, Player sammelt ein, XP-Bar im HUD | 3h | 🔴 |
| 2.2 | **Magnet-Radius** — Gems fliegen ab Distanz X zum Player | 1h | 🔴 |
| 2.3 | **Level-Up statt Kill-Count** — XP-basierte Upgrades (statt alle 10 Kills) | 2h | 🔴 |
| 2.4 | **Waffen-Overhaul** — Auto-Fire, Cooldown-basiert, Richtung = nächster Gegner | 3h | 🔴 |
| 2.5 | **Health-Pickups** — seltene Drops von Gegnern | 1h | 🟡 |
| 2.6 | **Damage Numbers** — Floating Text bei Hits | 1.5h | 🟡 |
| 2.7 | **Wave-Ankündigungen** — "Wave 2", "BOSS INCOMING" UI-Text | 1h | 🟡 |
| 2.8 | **Firewall-Gegner** (Tank, langsam, viel HP) | 2h | 🟡 |
| 2.9 | **Clipboard Karen** (Support, heilt andere Gegner) | 2h | 🟡 |
| 2.10 | **Kill Counter + Timer** im HUD | 30min | 🟢 |

### Abends (Druid)

| # | Task | Aufwand | Wann |
|---|------|---------|------|
| 2.D1 | Review + Playtest der PRISM-Tasks | 1h | Mi/Do |
| 2.D2 | Balancing: XP-Kurve, Spawn-Raten, Boss-Timer | 1h | Fr |
| 2.D3 | Zweite Waffe testen (Aktenkoffer?) | 1h | Fr/WE |

### Sprint 2 Ergebnis:
Fühlt sich wie VS an: Gems einsammeln, Level-Up, Auto-Fire, steigende Schwierigkeit, Boss-Fight.

---

> **Ziel:** Echte Assets, Sound, zweiter Character.

### Tagsüber (PRISM autonom)

| # | Task | Aufwand | Prio |
|---|------|---------|------|
| 3.1 | Gegner-Sprites (alle 5 Typen) — Blender MCP oder Krita | 4h | 🔴 |
| 3.2 | Boss-Sprite verbessern | 2h | 🔴 |
| 3.3 | Waffen-Sprites | 1.5h | 🟡 |
| 3.4 | Projektil + Effekt-Sprites | 2h | 🟡 |
| 3.5 | XP-Gem + Pickup Sprites | 1h | 🟡 |
| 3.6 | Sound FX (ElevenLabs/sfxr) | 2h | 🟡 |
| 3.7 | Musik: 1 Arena-Track + Menu (Suno/Udio) | 1h | 🟡 |
| 3.8 | Character Select Screen | 2h | 🟢 |
| 3.9 | Zweiter Character spielbar (Roxy?) | 2h | 🟢 |
| 3.10 | Victory Screen | 1h | 🔴 |

### Abends (Druid)

| # | Task | Aufwand |
|---|------|---------|
| 3.D1 | Floor/Wall Tiles verbessern (Krita) | 2h |
| 3.D2 | Assets in Godot integrieren + testen | 2h |
| 3.D3 | Cascadeur Animationen | 3h (WE) |

| 3.A2 | Character Select UI-Konzept | 1h |

## 🏃 Sprint 4 — "Polish & Ship" (KW 12: 16.–20.03.)

> **Ziel:** Demo-ready, Steam-Page live.

### Tagsüber (PRISM autonom)

| # | Task | Aufwand |
